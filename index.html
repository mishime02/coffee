<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast & Co. 會員系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, onSnapshot, serverTimestamp }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── 讀取設定 ──────────────────────────────────────────────
// 請先填好 firebase-config.js，這裡自動讀取
const cfgScript = await fetch('./firebase-config.js').then(r=>r.text());
const cfgMatch  = cfgScript.match(/FIREBASE_CONFIG\s*=\s*(\{[\s\S]*?\})/);
let FIREBASE_CONFIG = {};
try { FIREBASE_CONFIG = eval('('+cfgMatch[1]+')'); } catch(e) {}

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// ── 全域掛載供其他函式使用 ────────────────────────────────
window._db         = db;
window._collection = collection;
window._doc        = doc;
window._getDoc     = getDoc;
window._getDocs    = getDocs;
window._setDoc     = setDoc;
window._updateDoc  = updateDoc;
window._onSnapshot = onSnapshot;
window._ts         = serverTimestamp;
window._fbReady    = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root{
  --espresso:#2C1810;--roast:#5C3D2E;--caramel:#C8854A;
  --cream:#F5ECD7;--foam:#FDF8F0;--sage:#7A9E7E;
  --blush:#E8756A;--mist:#8B8FA8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--foam);color:var(--espresso);min-height:100vh;}

/* ── Loading screen ── */
#loading{
  position:fixed;inset:0;background:var(--espresso);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;color:var(--cream);gap:16px;
}
#loading .brand{font-family:'Playfair Display',serif;font-size:28px;color:var(--caramel);}
#loading .spinner{
  width:36px;height:36px;border:3px solid rgba(200,133,74,.3);
  border-top-color:var(--caramel);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Topbar ── */
.topbar{background:var(--espresso);color:var(--cream);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(44,24,16,.35);}
.topbar-brand{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.06em;color:var(--caramel);}
.mode-tabs{display:flex;gap:4px;}
.mode-btn{padding:6px 18px;border:none;border-radius:20px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:600;}
.mode-btn.active{background:var(--caramel);color:#fff;}
.mode-btn:not(.active){background:transparent;color:var(--cream);opacity:.65;}
.mode-btn:not(.active):hover{opacity:1;background:rgba(255,255,255,.12);}

/* ── Nav ── */
.nav-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.pill.active{background:var(--caramel);color:#fff;}
.view{display:none;}.view.show{display:block;}

/* ── Client ── */
.client-wrap{max-width:440px;margin:0 auto;padding:20px 16px 90px;}
.hero-card{background:linear-gradient(135deg,var(--espresso) 0%,var(--roast) 100%);border-radius:20px;padding:28px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.hero-card::before{content:'☕';position:absolute;right:-12px;bottom:-24px;font-size:130px;opacity:.07;pointer-events:none;}
.hero-greeting{font-size:13px;opacity:.65;margin-bottom:4px;}
.hero-name{font-size:22px;font-weight:700;margin-bottom:20px;}
.hero-stats{display:flex;gap:28px;}
.stat-label{font-size:11px;opacity:.55;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.09em;}
.stat-val{font-size:26px;font-weight:700;}
.stat-val small{font-size:14px;opacity:.65;}
.points-badge{position:absolute;top:24px;right:22px;background:var(--caramel);border-radius:12px;padding:5px 13px;font-size:13px;font-weight:700;}
.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cat-filter{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.cat-chip{padding:5px 14px;border-radius:16px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Noto Sans TC',sans-serif;font-weight:500;}
.cat-chip.active{background:var(--caramel);color:#fff;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.menu-card{background:#fff;border-radius:14px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:0 2px 8px rgba(44,24,16,.07);user-select:none;}
.menu-card:hover{border-color:var(--caramel);transform:translateY(-2px);}
.menu-emoji{font-size:28px;margin-bottom:8px;}
.menu-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.menu-price{font-size:13px;color:var(--caramel);font-weight:700;}
.cart-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--espresso);color:#fff;border:none;border-radius:30px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(44,24,16,.4);font-family:'Noto Sans TC',sans-serif;transition:transform .2s;z-index:50;min-width:200px;justify-content:center;}
.cart-float:hover{transform:translateX(-50%) translateY(-2px);}
.cart-badge{background:var(--caramel);border-radius:12px;padding:2px 9px;font-size:13px;}
.overlay{position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.panel{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;}
.panel-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px;}
.panel-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0;}
.cart-item-name{font-weight:500;font-size:14px;}
.cart-item-price{color:var(--caramel);font-weight:700;font-size:14px;margin-top:3px;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Noto Sans TC',sans-serif;}
.qty-num{font-weight:700;min-width:22px;text-align:center;}
.order-total{display:flex;justify-content:space-between;padding:16px 0;font-size:18px;font-weight:700;}
.order-total span:last-child{color:var(--caramel);}
.pay-label{font-size:13px;font-weight:700;margin-bottom:8px;display:block;}
.pay-options{display:flex;gap:8px;margin-bottom:14px;}
.pay-opt{flex:1;padding:10px;border:2px solid #eee;border-radius:12px;text-align:center;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all .2s;background:#fff;color:var(--espresso);}
.pay-opt.active{border-color:var(--caramel);background:#FFF8F0;color:var(--caramel);}
.balance-hint{font-size:12px;color:var(--mist);margin-bottom:10px;}
.balance-warn{color:var(--blush);}
.btn-main{width:100%;padding:15px;background:var(--espresso);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
.btn-main:hover{opacity:.85;}
.btn-caramel{background:var(--caramel);}
.order-row{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(44,24,16,.06);}
.order-row-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.order-date{font-size:12px;color:var(--mist);}
.order-amt{font-weight:700;color:var(--caramel);}
.order-items-txt{font-size:13px;color:#666;}
.topup-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 18px;}
.amt-btn{padding:12px;border:2px solid #eee;border-radius:12px;background:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;color:var(--espresso);}
.amt-btn.active{border-color:var(--caramel);background:#FFF8F0;color:var(--caramel);}
.balance-display{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(44,24,16,.06);}
.bd-label{font-size:13px;color:var(--mist);margin-bottom:6px;}
.bd-val{font-size:36px;font-weight:700;}
.points-card{background:linear-gradient(135deg,var(--sage) 0%,#5a7d5e 100%);border-radius:16px;padding:22px;color:#fff;margin-bottom:20px;}
.points-big{font-size:52px;font-weight:700;line-height:1;}
.points-sub{font-size:13px;opacity:.75;margin-top:5px;}
.coupon-list{display:flex;flex-direction:column;gap:10px;}
.coupon-item{background:#fff;border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(44,24,16,.06);border-left:4px solid var(--caramel);}
.coupon-name{font-weight:700;font-size:14px;}
.coupon-pts{font-size:12px;color:var(--mist);margin-top:2px;}
.redeem-btn{padding:8px 16px;background:var(--caramel);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.redeem-btn:disabled{background:#ccc;cursor:not-allowed;}

/* ── Login ── */
.login-wrap{max-width:360px;margin:60px auto;padding:0 20px;}
.login-card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 4px 24px rgba(44,24,16,.1);}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--mist);margin-bottom:24px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-lbl{font-size:13px;font-weight:700;}
.form-inp{padding:11px 14px;border:1.5px solid #e8e0d5;border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.form-inp:focus{border-color:var(--caramel);}
.login-btn{width:100%;padding:14px;background:var(--espresso);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:8px;}
.login-toggle{text-align:center;font-size:13px;color:var(--mist);margin-top:16px;cursor:pointer;}
.login-toggle span{color:var(--caramel);font-weight:700;}
.member-switch{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.m-sw-label{font-size:12px;color:var(--mist);}
.m-sw-btn{padding:4px 13px;border-radius:12px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;transition:all .2s;}
.m-sw-btn.active{background:var(--caramel);color:#fff;}

/* ── Admin ── */
.admin-wrap{max-width:960px;margin:0 auto;padding:24px 16px;}
.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.admin-head-title{font-size:22px;font-weight:700;}
.admin-head-date{font-size:13px;color:var(--mist);}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.kpi-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(44,24,16,.06);}
.kpi-label{font-size:12px;color:var(--mist);margin-bottom:8px;font-weight:500;}
.kpi-val{font-size:28px;font-weight:700;color:var(--espresso);}
.kpi-sub{font-size:12px;color:var(--sage);margin-top:4px;font-weight:500;}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.a-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(44,24,16,.06);}
.a-card-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:12px;width:66px;text-align:right;color:#666;flex-shrink:0;}
.bar-track{flex:1;height:10px;background:#f0ebe4;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--caramel),#e8a060);transition:width .8s cubic-bezier(.22,1,.36,1);}
.bar-val{font-size:12px;font-weight:700;color:var(--caramel);width:52px;flex-shrink:0;}
.m-table{width:100%;border-collapse:collapse;}
.m-table th{font-size:12px;color:var(--mist);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #f0ebe4;}
.m-table td{font-size:13px;padding:10px 12px;border-bottom:1px solid #f7f4f0;}
.m-table tr:last-child td{border-bottom:none;}
.tier{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.tier-gold{background:#FFF3CD;color:#B7791F;}
.tier-silver{background:#F0F0F0;color:#555;}
.tier-new{background:#E8F5E9;color:var(--sage);}
.txn-list{display:flex;flex-direction:column;gap:8px;}
.txn-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#faf8f5;border-radius:10px;}
.txn-name{font-weight:700;font-size:14px;}
.txn-detail{font-size:12px;color:var(--mist);margin-top:2px;}
.txn-amt{font-weight:700;color:var(--caramel);}
.txn-pts{font-size:11px;color:var(--sage);text-align:right;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-sel,.form-inp-a{padding:10px 14px;border:1.5px solid #e8e0d5;border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--espresso);background:#fff;outline:none;transition:border-color .2s;}
.form-sel:focus,.form-inp-a:focus{border-color:var(--caramel);}
.admin-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#fff;margin-top:4px;}
.admin-btn.primary{background:var(--espresso);}
.admin-btn.success{background:var(--sage);}
.pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.donut-wrap{display:flex;justify-content:center;margin:14px 0;}
.legend-list{display:flex;flex-direction:column;gap:8px;}
.legend-item{display:flex;align-items:center;gap:10px;font-size:13px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pref-chip{display:inline-block;background:#FFF3E0;color:var(--caramel);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;margin:2px;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--espresso);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

@media(max-width:640px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .admin-grid{grid-template-columns:1fr;}
  .pref-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="brand">Roast &amp; Co.</div>
  <div class="spinner"></div>
  <div style="font-size:13px;opacity:.6;">連接資料庫中…</div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">Roast &amp; Co.</div>
  <div class="mode-tabs">
    <button class="mode-btn active" onclick="switchMode('client')">客戶端</button>
    <button class="mode-btn" onclick="switchMode('admin')">管理端</button>
  </div>
</div>

<!-- ══ CLIENT ══ -->
<div id="mode-client">
  <div class="client-wrap">
    <div class="member-switch">
      <span class="m-sw-label">登入會員：</span>
      <div id="member-sw-btns"></div>
    </div>
    <div class="nav-pills">
      <button class="pill active" onclick="clientNav('c-home',this)">🏠 首頁</button>
      <button class="pill" onclick="clientNav('c-order',this)">🍽 點餐</button>
      <button class="pill" onclick="clientNav('c-points',this)">⭐ 集點</button>
      <button class="pill" onclick="clientNav('c-topup',this)">💳 儲值</button>
      <button class="pill" onclick="clientNav('c-history',this)">📋 紀錄</button>
    </div>
    <div id="c-home" class="view show"></div>
    <div id="c-order" class="view"></div>
    <div id="c-points" class="view"></div>
    <div id="c-topup" class="view"></div>
    <div id="c-history" class="view"></div>
  </div>
  <button class="cart-float" id="cart-float" style="display:none" onclick="openCart()">
    🛒 查看購物車 <span class="cart-badge" id="cart-count">0</span>
  </button>
</div>

<!-- Cart overlay -->
<div class="overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
  <div class="panel">
    <div class="panel-handle"></div>
    <div class="panel-title">購物車</div>
    <div id="cart-items"></div>
    <div class="order-total"><span>合計</span><span id="cart-total">NT$0</span></div>
    <span class="pay-label">付款方式</span>
    <div class="pay-options">
      <button class="pay-opt active" onclick="selectPay('餘額',this)">餘額</button>
      <button class="pay-opt" onclick="selectPay('現金',this)">現金</button>
      <button class="pay-opt" onclick="selectPay('信用卡',this)">信用卡</button>
    </div>
    <div class="balance-hint" id="balance-hint"></div>
    <button class="btn-main" onclick="placeOrder()">送出訂單</button>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div id="mode-admin" style="display:none">
  <div class="admin-wrap">
    <div class="admin-head">
      <div class="admin-head-title">☕ 管理後台</div>
      <div class="admin-head-date" id="admin-date"></div>
    </div>
    <div class="nav-pills">
      <button class="pill active" onclick="adminNav('a-dashboard',this)">📊 總覽</button>
      <button class="pill" onclick="adminNav('a-members',this)">👥 會員</button>
      <button class="pill" onclick="adminNav('a-txn',this)">💰 交易</button>
      <button class="pill" onclick="adminNav('a-topup',this)">💳 儲值扣款</button>
      <button class="pill" onclick="adminNav('a-analysis',this)">🔍 喜好分析</button>
    </div>
    <div id="a-dashboard" class="view show"></div>
    <div id="a-members" class="view"></div>
    <div id="a-txn" class="view"></div>
    <div id="a-topup" class="view"></div>
    <div id="a-analysis" class="view"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  App Logic（等待 Firebase 就緒後啟動）
// ══════════════════════════════════════════════
const MENU=[
  {id:1,name:"手沖黑咖啡",price:120,category:"咖啡",emoji:"☕"},
  {id:2,name:"拿鐵",price:150,category:"咖啡",emoji:"🥛"},
  {id:3,name:"卡布奇諾",price:150,category:"咖啡",emoji:"☕"},
  {id:4,name:"抹茶拿鐵",price:160,category:"特飲",emoji:"🍵"},
  {id:5,name:"焦糖瑪奇朵",price:170,category:"特飲",emoji:"🍮"},
  {id:6,name:"可頌",price:80,category:"輕食",emoji:"🥐"},
  {id:7,name:"起司蛋糕",price:120,category:"甜點",emoji:"🍰"},
  {id:8,name:"班尼迪克蛋",price:220,category:"輕食",emoji:"🍳"},
];
const COUPONS=[
  {id:1,name:"免費拿鐵一杯",points:150,desc:"任一拿鐵品項"},
  {id:2,name:"甜點買一送一",points:100,desc:"限週末使用"},
  {id:3,name:"消費折抵 $50",points:80,desc:"單筆滿 $200"},
];

let MEMBERS=[];
let currentMemberId=null;
let cart={};
let selectedPay="餘額";
let selectedTopupAmt=500;
let adminTopupType="add";
let activeCat="全部";
let db,_col,_doc,_getDoc,_getDocs,_setDoc,_updateDoc;

// ── 初始化 Firebase ──────────────────────────────────────
async function initFirebase(){
  db=window._db; _col=window._collection; _doc=window._doc;
  _getDoc=window._getDoc; _getDocs=window._getDocs;
  _setDoc=window._setDoc; _updateDoc=window._updateDoc;

  await seedIfEmpty();
  await loadMembers();
  document.getElementById('loading').style.display='none';
}

// 若 Firestore 是空的，寫入初始測試資料
async function seedIfEmpty(){
  const snap=await _getDocs(_col(db,'members'));
  if(!snap.empty) return;
  const seeds=[
    {id:"M001",name:"林小美",phone:"0912-345-678",balance:1500,points:320,joinDate:"2024-03-15",orders:[
      {date:"2026-06-10",items:["拿鐵","可頌"],total:230,points:23},
      {date:"2026-06-05",items:["抹茶拿鐵","起司蛋糕"],total:280,points:28},
    ]},
    {id:"M002",name:"陳大偉",phone:"0923-456-789",balance:800,points:150,joinDate:"2024-06-20",orders:[
      {date:"2026-06-11",items:["卡布奇諾","班尼迪克蛋"],total:370,points:37},
    ]},
    {id:"M003",name:"王雅婷",phone:"0934-567-890",balance:3200,points:580,joinDate:"2023-11-08",orders:[
      {date:"2026-06-12",items:["拿鐵","起司蛋糕","可頌"],total:350,points:35},
      {date:"2026-06-03",items:["手沖黑咖啡","班尼迪克蛋"],total:340,points:34},
    ]},
  ];
  for(const m of seeds) await _setDoc(_doc(db,'members',m.id),m);
}

async function loadMembers(){
  const snap=await _getDocs(_col(db,'members'));
  MEMBERS=snap.docs.map(d=>d.data());
  if(!currentMemberId && MEMBERS.length) currentMemberId=MEMBERS[0].id;
  renderMemberSwitcher();
  renderClientView(document.querySelector('#mode-client .view.show')?.id||'c-home');
}

async function saveMember(m){
  await _setDoc(_doc(db,'members',m.id),m);
  MEMBERS=MEMBERS.map(x=>x.id===m.id?m:x);
}

// ── Utils ────────────────────────────────────────────────
function getMember(){ return MEMBERS.find(m=>m.id===currentMemberId)||{}; }
function fmt(n){ return (n||0).toLocaleString('zh-TW'); }
function today(){ return new Date().toISOString().slice(0,10); }
let toastT;
function showToast(msg){
  let t=document.querySelector('.toast');if(t)t.remove();clearTimeout(toastT);
  t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2500);
}

// ── Mode / Nav ───────────────────────────────────────────
function switchMode(mode){
  document.getElementById('mode-client').style.display=mode==='client'?'':'none';
  document.getElementById('mode-admin').style.display=mode==='admin'?'':'none';
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='client')||(i===1&&mode==='admin')));
  if(mode==='admin'){document.getElementById('admin-date').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});renderAdminView('a-dashboard');}
}
function clientNav(id,btn){
  document.querySelectorAll('#mode-client .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderClientView(id);
}
function adminNav(id,btn){
  document.querySelectorAll('#mode-admin .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderAdminView(id);
}

// ── Member switcher ──────────────────────────────────────
function renderMemberSwitcher(){
  document.getElementById('member-sw-btns').innerHTML=MEMBERS.map(m=>`
    <button class="m-sw-btn${m.id===currentMemberId?' active':''}" onclick="switchMember('${m.id}',this)">${m.name}</button>`).join('');
}
function switchMember(id,btn){
  currentMemberId=id; cart={};
  document.querySelectorAll('.m-sw-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateCartFloat();
  renderClientView(document.querySelector('#mode-client .view.show')?.id||'c-home');
}

  if(id==='c-topup') renderTopup(m);
  if(id==='c-history') renderHistory(m);
}

// ── Cart ─────────────────────────────────────────────────
function addToCart(id){
  cart[id]=(cart[id]||0)+1;
  updateCartFloat();
  showToast('已加入 '+MENU.find(m=>m.id===id).name);
}
function updateQty(id,d){
  cart[id]=(cart[id]||0)+d;
  if(cart[id]<=0) delete cart[id];
  updateCartFloat(); renderCartPanel();
}
function updateCartFloat(){
  const total=Object.values(cart).reduce((s,q)=>s+q,0);
  document.getElementById('cart-float').style.display=total>0?'flex':'none';
  document.getElementById('cart-count').textContent=total;
}
function openCart(){ document.getElementById('cart-overlay').classList.add('open'); renderCartPanel(); }
function closeCart(){ document.getElementById('cart-overlay').classList.remove('open'); }
function selectPay(p,btn){
  selectedPay=p;
  document.querySelectorAll('.pay-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderCartPanel();
}
function renderCartPanel(){
  const m=getMember(); let html='',total=0;
  Object.entries(cart).forEach(([id,qty])=>{
    const item=MENU.find(m=>m.id==id); total+=item.price*qty;
    html+=`<div class="cart-item">
      <div><div class="cart-item-name">${item.emoji} ${item.name}</div><div class="cart-item-price">NT$${item.price*qty}</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="updateQty(${id},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="updateQty(${id},1)">+</button>
      </div></div>`;
  });
  document.getElementById('cart-items').innerHTML=html;
  document.getElementById('cart-total').textContent='NT$'+fmt(total);
  const hint=document.getElementById('balance-hint');
  if(selectedPay==='餘額'){
    hint.innerHTML=`帳戶餘額 NT$${fmt(m.balance)}`+(m.balance<total?' <span class="balance-warn">⚠ 不足</span>':'');
    hint.style.display='block';
  } else hint.style.display='none';
}
async function placeOrder(){
  const m=getMember();
  const total=Object.entries(cart).reduce((s,[id,q])=>s+MENU.find(x=>x.id==id).price*q,0);
  if(selectedPay==='餘額'&&m.balance<total){showToast('❌ 餘額不足，請先儲值');return;}
  const pts=Math.floor(total/10);
  const newOrder={date:today(),items:Object.entries(cart).map(([id])=>MENU.find(x=>x.id==id).name),total,points:pts};
  const updated={...m,
    balance:selectedPay==='餘額'?m.balance-total:m.balance,
    points:(m.points||0)+pts,
    orders:[newOrder,...(m.orders||[])]};
  await saveMember(updated);
  cart={}; closeCart(); updateCartFloat();
  showToast(`✅ 訂單成功！獲得 ${pts} 點`);
  renderClientView(document.querySelector('#mode-client .view.show')?.id||'c-home');
}

function selectTopupAmt(amt,btn){
  selectedTopupAmt=amt;
  document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const p=document.getElementById('topup-preview');if(p)p.textContent=amt;
}
async function doTopup(){
  const m=getMember();
  const updated={...m,balance:m.balance+selectedTopupAmt};
  await saveMember(updated);
  showToast(`💳 已儲值 NT$${selectedTopupAmt}`);
  renderClientView('c-topup');
}
async function redeemCoupon(cid){
  const c=COUPONS.find(x=>x.id===cid),m=getMember();
  if((m.points||0)<c.points){showToast('點數不足');return;}
  await saveMember({...m,points:m.points-c.points});
  showToast(`🎉 已兌換「${c.name}」`);
  renderClientView('c-points');
}

// ── Admin views ──────────────────────────────────────────
function getAllOrders(){
  return MEMBERS.flatMap(m=>(m.orders||[]).map(o=>({...o,memberName:m.name,memberId:m.id}))).sort((a,b)=>b.date.localeCompare(a.date));
}
function renderAdminView(id){
  if(id==='a-dashboard') renderDashboard();
  if(id==='a-members') renderMembersTable();
  if(id==='a-txn') renderAllTxn();
  if(id==='a-topup') renderAdminTopup();
  if(id==='a-analysis') renderAnalysis();
}

      </div>
      <div class="a-card"><div class="a-card-title">📋 最新交易</div>
        <div class="txn-list">${orders.slice(0,5).map(o=>`<div class="txn-row"><div><div class="txn-name">${o.memberName}</div><div class="txn-detail">${o.date} · ${o.items.slice(0,2).join('、')}${o.items.length>2?'…':''}</div></div><div class="txn-amt">NT$${o.total}</div></div>`).join('')}</div>

function setTopupType(type,btn){
  adminTopupType=type;
  document.querySelectorAll('#a-topup .pay-opt').forEach(b=>b.classList.remove('active'));

  document.getElementById('admin-topup-btn').textContent=type==='add'?'確認儲值':'確認扣款';
  document.getElementById('admin-topup-btn').className='admin-btn '+(type==='add'?'success':'primary');
}
async function doAdminTopup(){
  const id=document.getElementById('admin-topup-sel').value;
  const amt=parseInt(document.getElementById('admin-topup-amt').value);
  if(!amt||amt<=0){showToast('請輸入有效金額');return;}
  const m=MEMBERS.find(x=>x.id===id);
  await saveMember({...m,balance:adminTopupType==='add'?m.balance+amt:Math.max(0,m.balance-amt)});
  showToast(adminTopupType==='add'?`✅ 已為 ${m.name} 儲值 NT$${amt}`:`✅ 已扣款 NT$${amt}`);
  renderAdminView('a-topup');
}
function renderAnalysis(){
  const orders=getAllOrders();
  const catCount={};
  orders.forEach(o=>o.items.forEach(n=>{const it=MENU.find(m=>m.name===n);if(it)catCount[it.category]=(catCount[it.category]||0)+1;}));
  const colors=['#C8854A','#7A9E7E','#E8756A','#8B6FCE','#5BA4CF'];
  const catData=Object.entries(catCount).map(([k,v],i)=>({label:k,value:v,color:colors[i%colors.length]}));
  const total=catData.reduce((s,d)=>s+d.value,0);
  let cum=0,paths='';
  catData.forEach(d=>{
    const pct=d.value/total,sa=cum*2*Math.PI-Math.PI/2;cum+=pct;
    const ea=cum*2*Math.PI-Math.PI/2,r=44,cx=70,cy=70;
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${pct>.5?1:0},1,${x2},${y2} Z" fill="${d.color}" opacity=".9"/>`;
  });
  const maxS=Math.max(...MEMBERS.map(m=>(m.orders||[]).reduce((s,o)=>s+o.total,0)),1);
  document.getElementById('a-analysis').innerHTML=`
    <div class="pref-grid" style="margin-bottom:20px">
      <div class="a-card"><div class="a-card-title">🍩 品類偏好分佈</div>
        <div class="donut-wrap"><svg width="140" height="140">${paths}<circle cx="70" cy="70" r="26" fill="white"/></svg></div>
        <div class="legend-list">${catData.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span>${d.label}</span><span style="margin-left:auto;font-weight:700">${d.value}次</span></div>`).join('')}</div>
      </div>
      <div class="a-card"><div class="a-card-title">👤 個別會員偏好</div>
        ${MEMBERS.map(m=>{
          const freq={};(m.orders||[]).forEach(o=>o.items.forEach(n=>{freq[n]=(freq[n]||0)+1;}));
          const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3);
          return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0ebe4"><div style="font-weight:700;margin-bottom:6px">${m.name}</div>${top.map(([n,c])=>`<span class="pref-chip">${n} ×${c}</span>`).join('')}</div>`;
        }).join('')}
      </div>
    </div>
    <div class="a-card"><div class="a-card-title">📈 累計消費金額</div>
      <div class="bar-chart">${MEMBERS.map(m=>{const t=(m.orders||[]).reduce((s,o)=>s+o.total,0);return`<div class="bar-row"><div class="bar-lbl">${m.name}</div><div class="bar-track"><div class="bar-fill" style="width:${(t/maxS)*100}%"></div></div><div class="bar-val">$${fmt(t)}</div></div>`;}).join('')}</div>
    </div>`;
}

// ── 啟動 ─────────────────────────────────────────────────
if(window._fbReady){ initFirebase(); }
else { window.addEventListener('fb-ready', initFirebase); }
</script>
</body>
</html>
