<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast & Co. 會員系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, getDoc }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfgScript = await fetch('./firebase-config.js').then(r=>r.text());
const cfgMatch  = cfgScript.match(/FIREBASE_CONFIG\s*=\s*(\{[\s\S]*?\})/);
let FIREBASE_CONFIG = {};
try { FIREBASE_CONFIG = eval('('+cfgMatch[1]+')'); } catch(e) {}

const app  = initializeApp(FIREBASE_CONFIG);
const db   = getFirestore(app);
const auth = getAuth(app);

window._db=db; window._auth=auth;
window._col=collection; window._doc=doc;
window._getDocs=getDocs; window._setDoc=setDoc; window._getDoc=getDoc;
window._GP=GoogleAuthProvider; window._signIn=signInWithPopup;
window._signOut=signOut; window._onAuth=onAuthStateChanged;
window._fbReady=true; window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root{
  --espresso:#2C1810;--roast:#5C3D2E;--caramel:#C8854A;
  --cream:#F5ECD7;--foam:#FDF8F0;--sage:#7A9E7E;
  --blush:#E8756A;--mist:#8B8FA8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--foam);color:var(--espresso);min-height:100vh;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--espresso);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:var(--cream);gap:16px;}
.brand-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--caramel);}
.spinner{width:36px;height:36px;border:3px solid rgba(200,133,74,.3);border-top-color:var(--caramel);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--espresso);}
#login-screen.show{display:flex;}
.login-box{background:#fff;border-radius:28px;padding:48px 40px;max-width:360px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.login-logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--caramel);margin-bottom:4px;}
.login-tagline{font-size:13px;color:var(--mist);margin-bottom:36px;}
.login-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--mist);margin-bottom:28px;line-height:1.7;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1.5px solid #e0e0e0;border-radius:14px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#3c3c3c;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.google-btn:hover{border-color:#4285F4;box-shadow:0 4px 16px rgba(66,133,244,.2);transform:translateY(-1px);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
.login-note{font-size:11px;color:var(--mist);margin-top:20px;line-height:1.7;}

/* App */
#app{display:none;}#app.show{display:block;}

/* Topbar */
.topbar{background:var(--espresso);color:var(--cream);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(44,24,16,.35);}
.topbar-brand{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.06em;color:var(--caramel);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.mode-tabs{display:flex;gap:4px;}
.mode-btn{padding:6px 18px;border:none;border-radius:20px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:600;}
.mode-btn.active{background:var(--caramel);color:#fff;}
.mode-btn:not(.active){background:transparent;color:var(--cream);opacity:.65;}
.mode-btn:not(.active):hover{opacity:1;background:rgba(255,255,255,.12);}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--caramel);}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--cream);border-radius:12px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;opacity:.7;}
.logout-btn:hover{opacity:1;}

/* Nav */
.nav-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.pill.active{background:var(--caramel);color:#fff;}
.view{display:none;}.view.show{display:block;}

/* Client wrap */
.client-wrap{max-width:440px;margin:0 auto;padding:20px 16px 60px;}
.user-info-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 8px rgba(44,24,16,.06);}
.user-info-bar img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.user-info-name{font-weight:700;font-size:14px;}
.user-info-email{font-size:11px;color:var(--mist);}
.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;}

/* ── 集點卡 ── */
.stamp-card{
  background:linear-gradient(135deg,var(--espresso) 0%,var(--roast) 100%);
  border-radius:24px;padding:28px 24px;color:#fff;
  margin-bottom:20px;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(44,24,16,.25);
}
.stamp-card::before{content:'☕';position:absolute;right:-16px;bottom:-28px;font-size:140px;opacity:.06;pointer-events:none;}
.stamp-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.stamp-card-brand{font-family:'Playfair Display',serif;font-size:18px;color:var(--caramel);}
.stamp-card-label{font-size:11px;opacity:.5;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.stamp-card-badge{background:rgba(255,255,255,.12);border-radius:12px;padding:6px 14px;text-align:center;min-width:64px;}
.stamp-card-badge-num{font-size:24px;font-weight:700;line-height:1;}
.stamp-card-badge-sub{font-size:10px;opacity:.6;margin-top:2px;}
.stamp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px;}
.stamp{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s;border:2px solid rgba(255,255,255,.2);}
.stamp.filled{background:var(--caramel);border-color:var(--caramel);box-shadow:0 2px 8px rgba(200,133,74,.5);}
.stamp.empty{background:rgba(255,255,255,.08);}
.stamp-card-footer{display:flex;justify-content:space-between;align-items:center;}
.stamp-card-name{font-size:15px;font-weight:700;opacity:.9;}
.stamp-card-sub{font-size:11px;opacity:.5;margin-top:2px;}
.stamp-progress{font-size:12px;opacity:.6;}

/* ── 兌換券 ── */
.coupon-section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.coupon-count-badge{background:var(--caramel);color:#fff;border-radius:12px;padding:2px 10px;font-size:13px;font-weight:700;}
.coupon-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.coupon-card{
  background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 2px 12px rgba(44,24,16,.08);
  cursor:pointer;transition:transform .2s;
}
.coupon-card:hover{transform:translateY(-2px);}
.coupon-card-inner{display:flex;align-items:stretch;}
.coupon-left{background:linear-gradient(135deg,var(--caramel),#e8a060);width:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:28px;position:relative;}
.coupon-left::after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:16px;height:16px;background:var(--foam);border-radius:50%;}
.coupon-right{padding:14px 16px;flex:1;}
.coupon-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.coupon-sub{font-size:12px;color:var(--mist);}
.coupon-arrow{font-size:18px;color:var(--mist);display:flex;align-items:center;padding-right:14px;}

.coupon-empty{text-align:center;padding:28px 20px;color:var(--mist);background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(44,24,16,.06);}
.coupon-empty-icon{font-size:36px;margin-bottom:8px;}
.coupon-empty-txt{font-size:13px;line-height:1.7;}

/* ── 兌換券詳情 overlay ── */
.overlay{position:fixed;inset:0;background:rgba(26,26,46,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.panel{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.panel-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 24px;}
.panel-title{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center;}
.panel-sub{font-size:13px;color:var(--mist);text-align:center;margin-bottom:24px;}
.coupon-qr-wrap{display:flex;justify-content:center;margin-bottom:20px;}
.coupon-qr-box{background:var(--foam);border-radius:20px;padding:20px;border:3px solid var(--caramel);text-align:center;}
.coupon-code-txt{font-family:monospace;font-size:13px;color:var(--mist);margin-top:10px;letter-spacing:.05em;}
.panel-note{background:#FFF8F0;border-radius:12px;padding:12px 16px;font-size:13px;color:var(--roast);line-height:1.6;margin-bottom:20px;text-align:center;}
.panel-btn{width:100%;padding:15px;background:var(--espresso);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.panel-btn:hover{opacity:.85;}
.panel-btn.close{background:#f0ebe4;color:var(--espresso);margin-top:10px;}

/* 集點紀錄 */
.log-row{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(44,24,16,.06);display:flex;justify-content:space-between;align-items:center;}
.log-type-earn{color:var(--sage);font-weight:600;font-size:13px;}
.log-type-redeem{color:var(--blush);font-weight:600;font-size:13px;}
.log-date{font-size:12px;color:var(--mist);margin-top:3px;}
.log-pts{font-size:22px;font-weight:700;color:var(--caramel);}
.log-pts-label{font-size:11px;color:var(--mist);text-align:right;}

/* ── 掃碼結果 ── */
#scan-view{display:none;}
.scan-wrap{max-width:380px;margin:40px auto;padding:0 20px;text-align:center;}
.scan-card{background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 4px 24px rgba(44,24,16,.1);}
.scan-icon{font-size:56px;margin-bottom:16px;}
.scan-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.scan-sub{font-size:14px;color:var(--mist);line-height:1.7;margin-bottom:24px;white-space:pre-line;}
.scan-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;background:var(--espresso);color:#fff;}

/* ── Admin ── */
.admin-wrap{max-width:820px;margin:0 auto;padding:24px 16px;}
.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.admin-head-title{font-size:22px;font-weight:700;}
.admin-head-date{font-size:13px;color:var(--mist);}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(44,24,16,.06);}
.kpi-label{font-size:12px;color:var(--mist);margin-bottom:8px;font-weight:500;}
.kpi-val{font-size:28px;font-weight:700;color:var(--espresso);}
.kpi-sub{font-size:12px;color:var(--sage);margin-top:4px;font-weight:500;}
.a-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(44,24,16,.06);margin-bottom:20px;}
.a-card-title{font-size:15px;font-weight:700;margin-bottom:16px;}

/* QR panel */
.qr-panel{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
.qr-box{flex-shrink:0;background:#fff;border:3px solid var(--caramel);border-radius:20px;padding:20px;text-align:center;}
.qr-info{flex:1;min-width:200px;}
.qr-code-display{font-family:monospace;font-size:12px;background:#f5f0e8;border-radius:8px;padding:8px 12px;margin-bottom:12px;word-break:break-all;color:var(--roast);}
.pts-slider-label{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;}
.pts-val{color:var(--caramel);font-size:18px;}
input[type=range]{width:100%;accent-color:var(--caramel);cursor:pointer;}
.regen-btn{width:100%;padding:12px;background:var(--espresso);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:12px;}
.regen-btn:hover{opacity:.85;}

/* Scanner */
.scanner-area{background:#000;border-radius:16px;overflow:hidden;position:relative;aspect-ratio:1;max-width:320px;margin:0 auto 16px;}
#qr-reader{width:100%;}
.scan-result-box{background:#f5f0e8;border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:14px;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center;color:var(--roast);}

/* Member table */
.m-table{width:100%;border-collapse:collapse;}
.m-table th{font-size:12px;color:var(--mist);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #f0ebe4;}
.m-table td{font-size:13px;padding:10px 12px;border-bottom:1px solid #f7f4f0;}
.m-table tr:last-child td{border-bottom:none;}

/* Log table */
.log-table{width:100%;border-collapse:collapse;}
.log-table th{font-size:12px;color:var(--mist);font-weight:500;padding:8px 12px;border-bottom:1px solid #f0ebe4;text-align:left;}
.log-table td{font-size:13px;padding:10px 12px;border-bottom:1px solid #f7f4f0;}
.log-table tr:last-child td{border-bottom:none;}
.badge-earn{background:#E8F5E9;color:var(--sage);padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;}
.badge-redeem{background:#FEE2E0;color:var(--blush);padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;}

/* Denied */
.denied-wrap{max-width:380px;margin:80px auto;padding:0 20px;text-align:center;}
.denied-card{background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 4px 24px rgba(44,24,16,.1);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--espresso);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .qr-panel{flex-direction:column;align-items:center;}
  .qr-info{width:100%;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="brand-logo">Roast &amp; Co.</div>
  <div class="spinner"></div>
  <div style="font-size:13px;opacity:.6">驗證身份中…</div>
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Roast &amp; Co.</div>
    <div class="login-tagline">會員專屬集點服務</div>
    <div class="login-title">歡迎加入</div>
    <div class="login-sub">使用 Google 帳號登入<br>開始收集你的咖啡印章 ☕</div>
    <button class="google-btn" onclick="doLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google 帳號登入
    </button>
    <div class="login-note">登入後將保持登入狀態，集點紀錄安全儲存於雲端</div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Roast &amp; Co.</div>
    <div class="topbar-right">
      <div class="mode-tabs" id="mode-tabs" style="display:none">
        <button class="mode-btn active" onclick="switchMode('client')">客戶端</button>
        <button class="mode-btn" onclick="switchMode('admin')">管理端</button>
      </div>
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- CLIENT -->
  <div id="mode-client">
    <div class="client-wrap">
      <div class="user-info-bar">
        <img id="client-avatar" src="" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
        <div>
          <div class="user-info-name" id="client-name"></div>
          <div class="user-info-email" id="client-email"></div>
        </div>
      </div>
      <div class="nav-pills">
        <button class="pill active" onclick="clientNav('c-stamp',this)">☕ 集點卡</button>
        <button class="pill" onclick="clientNav('c-history',this)">📋 集點紀錄</button>
      </div>
      <div id="c-stamp" class="view show"></div>
      <div id="c-history" class="view"></div>
    </div>
  </div>

  <!-- 兌換券 overlay -->
  <div class="overlay" id="coupon-overlay" onclick="if(event.target===this)closePanel()">
    <div class="panel">
      <div class="panel-handle"></div>
      <div class="panel-title">🎁 免費飲品兌換券</div>
      <div class="panel-sub">向店員出示下方 QR Code 即可兌換</div>
      <div class="coupon-qr-wrap">
        <div class="coupon-qr-box">
          <div id="coupon-qr-canvas" style="width:180px;height:180px;"></div>
          <div class="coupon-code-txt" id="coupon-qr-code-txt"></div>
        </div>
      </div>
      <div class="panel-note">⚠️ 請將此畫面出示給店員掃描<br>掃描後此券將立即核銷</div>
      <button class="panel-btn close" onclick="closePanel()">關閉</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="mode-admin" style="display:none">
    <div class="admin-wrap">
      <div class="admin-head">
        <div class="admin-head-title">☕ 管理後台</div>
        <div class="admin-head-date" id="admin-date"></div>
      </div>
      <div class="nav-pills">
        <button class="pill active" onclick="adminNav('a-qr',this)">🔳 集點 QR Code</button>
        <button class="pill" onclick="adminNav('a-scan',this)">📷 核銷掃描</button>
        <button class="pill" onclick="adminNav('a-members',this)">👥 會員</button>
        <button class="pill" onclick="adminNav('a-log',this)">📋 紀錄</button>
      </div>
      <div id="a-qr" class="view show"></div>
      <div id="a-scan" class="view"></div>
      <div id="a-members" class="view"></div>
      <div id="a-log" class="view"></div>
    </div>
  </div>

  <!-- Access denied -->
  <div id="mode-denied" style="display:none">
    <div class="denied-wrap">
      <div class="denied-card">
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">無管理權限</div>
        <div style="font-size:13px;color:var(--mist);line-height:1.7;margin-bottom:24px">你的帳號沒有管理後台的存取權限。<br>請聯絡店家取得授權。</div>
        <button style="padding:12px 24px;background:var(--espresso);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;" onclick="switchMode('client')">回到集點頁面</button>
      </div>

</div>

<!-- 掃碼集點結果頁 -->
<div id="scan-view">
  <div class="topbar"><div class="topbar-brand">Roast &amp; Co.</div></div>
  <div class="scan-wrap">
    <div class="scan-card">
      <div class="scan-icon" id="scan-icon">⏳</div>
      <div class="scan-title" id="scan-title">驗證中…</div>
      <div class="scan-sub" id="scan-sub"></div>
      <button class="scan-btn" id="scan-btn" style="display:none" onclick="goHome()">查看我的集點卡</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const ADMIN_EMAILS=['mishime8175@gmail.com','beamcoast.coffee@gmail.com'];
const STAMP_MAX=12;

let db,auth,currentUser=null,memberData=null,MEMBERS=[];
let adminPtsValue=1;
let activeCouponId=null;
let html5QrScanner=null;

// ── Utils ──────────────────────────────────────────
function nowStr(){ return new Date().toLocaleString('zh-TW',{hour12:false}); }
function today(){ return new Date().toISOString().slice(0,10); }
function isAdmin(){ return ADMIN_EMAILS.includes(currentUser?.email?.toLowerCase()); }
function randCode(){ return 'CPN-'+Math.random().toString(36).slice(2,10).toUpperCase(); }
let toastT;
function showToast(msg){
  let t=document.querySelector('.toast');if(t)t.remove();clearTimeout(toastT);
  t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2800);
}

// ── Firebase ───────────────────────────────────────
async function initFirebase(){
  db=window._db; auth=window._auth;
  window._onAuth(auth, async user=>{
    if(user){
      currentUser=user;
      await ensureMember(user);
      await loadMembers();
      const params=new URLSearchParams(location.search);
      const code=params.get('code');
      const redeem=params.get('redeem');
      if(code) await handleStampScan(code);
      else if(redeem) await handleRedeemScan(redeem);
      else showApp(user);
    } else {
      currentUser=null;
      const params=new URLSearchParams(location.search);
      if(params.get('code')||params.get('redeem')) showToast('請先登入');
      showLoginScreen();
    }
  });
}

async function ensureMember(user){
  const ref=window._doc(db,'members',user.uid);
  const snap=await window._getDoc(ref);
  if(!snap.exists()){
    await window._setDoc(ref,{
      id:user.uid,name:user.displayName||'會員',
      email:user.email,photo:user.photoURL||'',
      totalStamps:0,coupons:[],log:[],joinDate:today()
    });
  }
}

async function loadMembers(){
  const snap=await window._getDocs(window._col(db,'members'));
  MEMBERS=snap.docs.map(d=>d.data());
  memberData=MEMBERS.find(m=>m.id===currentUser?.uid)||null;
}

async function saveMember(m){
  await window._setDoc(window._doc(db,'members',m.id),m);
  MEMBERS=MEMBERS.map(x=>x.id===m.id?m:x);
  if(m.id===currentUser?.uid) memberData=m;
}

async function getQRConfig(){
  const snap=await window._getDoc(window._doc(db,'config','qr'));
  return snap.exists()?snap.data():null;
}
async function saveQRConfig(cfg){
  await window._setDoc(window._doc(db,'config','qr'),cfg);
}

// ── Auth UI ────────────────────────────────────────
function showLoginScreen(){
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').classList.add('show');
  document.getElementById('app').classList.remove('show');
  document.getElementById('scan-view').style.display='none';
}
function showApp(user){
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('scan-view').style.display='none';
  document.getElementById('app').classList.add('show');
  if(user.photoURL){
    document.getElementById('user-avatar').src=user.photoURL;
    document.getElementById('client-avatar').src=user.photoURL;
  }
  document.getElementById('client-name').textContent=user.displayName||'會員';
  document.getElementById('client-email').textContent=user.email;
  document.getElementById('mode-tabs').style.display=isAdmin()?'flex':'none';
  renderClientView('c-stamp');
}
async function doLogin(){ try{ await window._signIn(auth,new window._GP()); }catch(e){ showToast('登入失敗，請再試一次'); } }
async function doLogout(){ await window._signOut(auth); }
function goHome(){ location.href=location.pathname; }

// ── 掃碼：集點 ────────────────────────────────────
async function handleStampScan(code){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('scan-view').style.display='block';

  const icon=document.getElementById('scan-icon');
  const title=document.getElementById('scan-title');
  const sub=document.getElementById('scan-sub');
  const btn=document.getElementById('scan-btn');

  if(!currentUser){
    icon.textContent='🔑'; title.textContent='請先登入';
    sub.textContent='登入後才能領取點數';
    btn.textContent='Google 登入'; btn.style.display='block';
    btn.onclick=async()=>{ try{ await window._signIn(auth,new window._GP()); }catch(e){} };
    return;
  }
  try{
    const cfg=await getQRConfig();
    if(!cfg||cfg.code!==code){
      icon.textContent='❌'; title.textContent='QR Code 已失效';
      sub.textContent='此 QR Code 已過期。\n請向店員取得最新的 QR Code。';
      btn.textContent='回到集點卡'; btn.style.display='block'; btn.onclick=goHome;
      return;
    }
    const pts=cfg.points||1;
    const m=memberData||{id:currentUser.uid,name:currentUser.displayName,email:currentUser.email,photo:currentUser.photoURL||'',totalStamps:0,coupons:[],log:[],joinDate:today()};
    const prev=m.totalStamps||0;
    const newTotal=prev+pts;

    // 計算新增幾張券
    const prevCoupons=Math.floor(prev/STAMP_MAX);
    const newCoupons=Math.floor(newTotal/STAMP_MAX);
    const earnedCoupons=newCoupons-prevCoupons;

    // 生成新券
    const newCouponList=[...(m.coupons||[])];
    for(let i=0;i<earnedCoupons;i++){
      newCouponList.push({id:randCode(),earnedAt:nowStr(),used:false});
    }

    const logEntry={type:'earn',pts,date:nowStr(),note:'掃碼集點'};
    const updated={...m,totalStamps:newTotal,coupons:newCouponList,log:[logEntry,...(m.log||[])]};
    await saveMember(updated);

    const currentStamps=newTotal%STAMP_MAX||( newTotal>0&&newTotal%STAMP_MAX===0?STAMP_MAX:0);
    const displayStamps=newTotal%STAMP_MAX;

    if(earnedCoupons>0){
      icon.textContent='🎉'; title.textContent=`集滿 ${STAMP_MAX} 點！獲得兌換券！`;
      sub.textContent=`獲得 ${pts} 點\n🎁 新增 ${earnedCoupons} 張免費飲品兌換券\n目前共有 ${newCouponList.filter(c=>!c.used).length} 張可用券`;
    } else {
      icon.textContent='☕'; title.textContent=`成功獲得 ${pts} 點！`;
      sub.textContent=`累計已集 ${newTotal} 點\n目前進度：${displayStamps} / ${STAMP_MAX} 點\n再集 ${STAMP_MAX-displayStamps} 點可獲得兌換券`;
    }
    btn.textContent='查看我的集點卡'; btn.style.display='block'; btn.onclick=goHome;
  }catch(e){
    icon.textContent='⚠️'; title.textContent='發生錯誤';
    sub.textContent='請稍後再試或聯絡店家。';
    btn.textContent='回到集點卡'; btn.style.display='block'; btn.onclick=goHome;
  }
}

// ── 掃碼：核銷（管理端掃客人的券）────────────────
async function handleRedeemScan(couponId){
  // 此為管理端掃描後的結果，找到對應的會員與券
  await loadMembers();
  let targetMember=null, targetCoupon=null;
  for(const m of MEMBERS){
    const c=(m.coupons||[]).find(c=>c.id===couponId);
    if(c){ targetMember=m; targetCoupon=c; break; }
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('scan-view').style.display='block';
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').classList.remove('show');

  const icon=document.getElementById('scan-icon');
  const title=document.getElementById('scan-title');
  const sub=document.getElementById('scan-sub');
  const btn=document.getElementById('scan-btn');

  if(!currentUser||!isAdmin()){
    icon.textContent='🔒'; title.textContent='需要管理員身份';
    sub.textContent='只有管理員才能核銷兌換券。';
    btn.textContent='登入管理端'; btn.style.display='block'; btn.onclick=goHome;
    return;
  }

  if(!targetMember||!targetCoupon){
    icon.textContent='❌'; title.textContent='找不到此兌換券';
    sub.textContent='此兌換券不存在或已被使用。';
    btn.textContent='回到管理端'; btn.style.display='block'; btn.onclick=()=>{ location.href=location.pathname; };
    return;
  }

  if(targetCoupon.used){
    icon.textContent='⚠️'; title.textContent='此券已使用';
    sub.textContent=`這張兌換券已於 ${targetCoupon.usedAt||'先前'} 核銷。\n\n會員：${targetMember.name}`;
    btn.textContent='回到管理端'; btn.style.display='block'; btn.onclick=goHome;
    return;
  }

  // 核銷
  const updatedCoupons=(targetMember.coupons||[]).map(c=>c.id===couponId?{...c,used:true,usedAt:nowStr()}:c);
  const logEntry={type:'redeem',pts:0,date:nowStr(),note:`兌換券 ${couponId} 已核銷`};
  await saveMember({...targetMember,coupons:updatedCoupons,log:[logEntry,...(targetMember.log||[])]});

  icon.textContent='✅'; title.textContent='核銷成功！';
  sub.textContent=`已為 ${targetMember.name} 核銷免費飲品兌換券\n\n券號：${couponId}\n時間：${nowStr()}`;
  btn.textContent='回到管理端'; btn.style.display='block'; btn.onclick=goHome;
}

// ── Mode / Nav ─────────────────────────────────────
function switchMode(mode){
  ['mode-client','mode-admin','mode-denied'].forEach(id=>document.getElementById(id).style.display='none');
  if(mode==='admin'&&!isAdmin()){ document.getElementById('mode-denied').style.display='block'; }
  else if(mode==='admin'){
    document.getElementById('mode-admin').style.display='block';
    document.getElementById('admin-date').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
    loadMembers().then(()=>renderAdminView('a-qr'));
  } else {
    document.getElementById('mode-client').style.display='block';
    renderClientView(document.querySelector('#mode-client .view.show')?.id||'c-stamp');
  }
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='client')||(i===1&&mode==='admin')));
}
function clientNav(id,btn){
  document.querySelectorAll('#mode-client .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); renderClientView(id);
}
function adminNav(id,btn){
  if(html5QrScanner){ try{ html5QrScanner.stop(); }catch(e){} html5QrScanner=null; }
  document.querySelectorAll('#mode-admin .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); renderAdminView(id);
}

// ── Client views ───────────────────────────────────
function renderClientView(id){
  if(id==='c-stamp') renderStampCard();
  if(id==='c-history') renderHistory();
}

function renderStampCard(){
  const m=memberData||{totalStamps:0,coupons:[],log:[]};
  const total=m.totalStamps||0;
  const displayStamps=total%STAMP_MAX;

  // 12格印章（顯示當前輪次進度）
  let grid='';
  for(let i=0;i<STAMP_MAX;i++){
    grid+=`<div class="stamp ${i<displayStamps?'filled':'empty'}">${i<displayStamps?'☕':''}</div>`;

  // 兌換券列表

          <div class="coupon-right">
            <div class="coupon-title">免費飲品兌換券</div>
            <div class="coupon-sub">獲得於 ${c.earnedAt||''}・點擊查看 QR Code</div>
          </div>
          <div class="coupon-arrow">›</div>
        </div>
      </div>`).join('');
  }

  document.getElementById('c-stamp').innerHTML=`
    <div class="stamp-card">
      <div class="stamp-card-top">
        <div>
          <div class="stamp-card-brand">Roast &amp; Co.</div>
          <div class="stamp-card-label">集點卡 · Loyalty Card</div>
        </div>
        <div class="stamp-card-badge">
          <div class="stamp-card-badge-num">${displayStamps}</div>
          <div class="stamp-card-badge-sub">/ ${STAMP_MAX} 點</div>
        </div>
      </div>
      <div class="stamp-grid">${grid}</div>
      <div class="stamp-card-footer">
        <div>
          <div class="stamp-card-name">${currentUser?.displayName||'會員'}</div>
          <div class="stamp-card-sub">累計已集 ${total} 點・已兌換 ${usedCoupons.length} 次</div>
        </div>
        <div class="stamp-progress">集滿 ${STAMP_MAX} 點換一杯 ☕</div>
      </div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(44,24,16,.06);text-align:center;margin-bottom:20px;">
      <div style="font-size:13px;color:var(--mist);margin-bottom:4px">如何集點？</div>
      <div style="font-size:14px;font-weight:600">每次消費後掃描店內 QR Code 即可獲得點數 📱</div>
    </div>
    <div class="coupon-section-title">
      <span>🎫 我的兌換券</span>
      ${unusedCoupons.length?`<span class="coupon-count-badge">${unusedCoupons.length} 張</span>`:''}
    </div>
    <div class="coupon-list">${couponHTML}</div>`;
}

function renderHistory(){
  const m=memberData||{log:[]};
  const log=m.log||[];
  document.getElementById('c-history').innerHTML=`
    <div class="sec-title">📋 集點紀錄</div>
    ${!log.length?`<div style="color:var(--mist);font-size:13px;padding:20px 0;text-align:center">尚無紀錄<br>快去掃描 QR Code 集點吧！</div>`:
    log.map(l=>`
      <div class="log-row">
        <div>
          <div class="${l.type==='earn'?'log-type-earn':'log-type-redeem'}">${l.type==='earn'?'獲得點數':'使用兌換券'}</div>
          <div class="log-date">${l.date}</div>
          ${l.note?`<div style="font-size:12px;color:var(--mist);margin-top:2px">${l.note}</div>`:''}
        </div>
        <div style="text-align:right">
          ${l.type==='earn'?`<div class="log-pts">+${l.pts}</div><div class="log-pts-label">點</div>`:'<div style="font-size:22px">☕</div>'}
        </div>
      </div>`).join('')}`;
}

// ── 兌換券 Panel ───────────────────────────────────
let couponQRInstance=null;
function openCoupon(couponId){
  activeCouponId=couponId;
  const m=memberData||{};
  const coupon=(m.coupons||[]).find(c=>c.id===couponId);
  if(!coupon) return;

  // 生成兌換用 URL（帶 redeem 參數）
  const redeemUrl=`${location.origin}${location.pathname}?redeem=${couponId}`;

  document.getElementById('coupon-qr-canvas').innerHTML='';
  document.getElementById('coupon-qr-code-txt').textContent=couponId;
  document.getElementById('coupon-overlay').classList.add('open');

  setTimeout(()=>{
    const el=document.getElementById('coupon-qr-canvas');
    if(el){
      el.innerHTML='';
      new QRCode(el,{text:redeemUrl,width:180,height:180,colorDark:'#2C1810',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
    }
  },100);
}
function closePanel(){
  document.getElementById('coupon-overlay').classList.remove('open');
  activeCouponId=null;
}

// ── Admin views ────────────────────────────────────
function renderAdminView(id){
  if(id==='a-qr')      renderAdminQR();
  if(id==='a-scan')    renderAdminScanner();
  if(id==='a-members') renderAdminMembers();
  if(id==='a-log')     renderAdminLog();
}

let qrAdminInstance=null;
async function renderAdminQR(){
  const cfg=await getQRConfig();
  const code=cfg?.code||'';
  const pts=cfg?.points||1;
  adminPtsValue=pts;
  const url=code?`${location.origin}${location.pathname}?code=${code}`:'';

  document.getElementById('a-qr').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">總會員數</div><div class="kpi-val">${MEMBERS.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">累計集點次數</div><div class="kpi-val">${MEMBERS.reduce((s,m)=>s+(m.log||[]).filter(l=>l.type==='earn').length,0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">累計核銷次數</div><div class="kpi-val">${MEMBERS.reduce((s,m)=>s+(m.coupons||[]).filter(c=>c.used).length,0)}</div></div>
    </div>
    <div class="a-card">
      <div class="a-card-title">🔳 店家集點 QR Code</div>

          <div id="admin-qr-canvas" style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;">
            ${!code?'<div style="color:var(--mist);font-size:13px;text-align:center">尚未生成<br>QR Code</div>':''}
          </div>
          ${code?`<div style="font-size:11px;color:var(--mist);margin-top:10px;text-align:center">客人掃此碼集點</div>`:''}
        </div>
        <div class="qr-info">
          ${code?`<div style="font-size:13px;font-weight:700;margin-bottom:6px">目前 Code</div>
          <div class="qr-code-display">${code}</div>`:'<div style="color:var(--mist);font-size:13px;margin-bottom:12px">請先生成 QR Code</div>'}
          <div style="margin-bottom:14px">
            <div class="pts-slider-label">
              <span>掃碼獲得點數</span>
              <span class="pts-val" id="pts-display">${pts} 點</span>
            </div>

              oninput="adminPtsValue=+this.value;document.getElementById('pts-display').textContent=this.value+' 點'">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mist);margin-top:4px"><span>1</span><span>12</span></div>

async function regenQR(){
  const newCode=Math.random().toString(36).slice(2,10).toUpperCase();
  const pts=adminPtsValue||parseInt(document.getElementById('pts-slider')?.value)||1;
  await saveQRConfig({code:newCode,points:pts,updatedAt:nowStr()});
  showToast(`✅ 新 QR Code 已生成，${pts} 點/次`);
  renderAdminQR();
}

// ── 管理端掃描器（核銷兌換券）─────────────────────
function renderAdminScanner(){
  document.getElementById('a-scan').innerHTML=`
    <div class="a-card">
      <div class="a-card-title">📷 掃描客人兌換券 QR Code</div>
      <div class="scanner-area"><div id="qr-reader"></div></div>
      <div class="scan-result-box" id="admin-scan-result">請將客人的兌換券 QR Code 對準鏡頭</div>
      <button class="regen-btn" id="scanner-toggle" onclick="toggleScanner()">▶ 開始掃描</button>
    </div>`;
}

let scannerRunning=false;
function toggleScanner(){
  if(scannerRunning){ stopScanner(); }
  else { startScanner(); }
}
function startScanner(){
  if(html5QrScanner) return;
  html5QrScanner=new Html5Qrcode('qr-reader');
  html5QrScanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:220,height:220}},
    async(decodedText)=>{
      await processRedeemCode(decodedText);
    },
    ()=>{}
  ).then(()=>{
    scannerRunning=true;
    document.getElementById('scanner-toggle').textContent='⏹ 停止掃描';
  }).catch(()=>{ showToast('無法開啟相機，請確認已授予相機權限'); });
}
function stopScanner(){
  if(html5QrScanner){
    html5QrScanner.stop().then(()=>{ html5QrScanner.clear(); html5QrScanner=null; scannerRunning=false; });
    const btn=document.getElementById('scanner-toggle');
    if(btn) btn.textContent='▶ 開始掃描';
  }
}

async function processRedeemCode(text){
  // 解析 URL 中的 redeem 參數
  let couponId=text;
  try{
    const url=new URL(text);
    couponId=url.searchParams.get('redeem')||text;
  }catch(e){}

  stopScanner();
  const resultEl=document.getElementById('admin-scan-result');
  if(resultEl) resultEl.textContent='處理中…';

  await loadMembers();
  let targetMember=null, targetCoupon=null;
  for(const m of MEMBERS){
    const c=(m.coupons||[]).find(c=>c.id===couponId);
    if(c){ targetMember=m; targetCoupon=c; break; }
  }

  if(!targetMember||!targetCoupon){
    if(resultEl) resultEl.innerHTML='<span style="color:var(--blush)">❌ 找不到此兌換券</span>';
    return;
  }
  if(targetCoupon.used){
    if(resultEl) resultEl.innerHTML=`<span style="color:var(--blush)">⚠️ 此券已使用（${targetCoupon.usedAt||''}）<br>會員：${targetMember.name}</span>`;
    return;
  }

  // 核銷
  const updatedCoupons=(targetMember.coupons||[]).map(c=>c.id===couponId?{...c,used:true,usedAt:nowStr()}:c);
  const logEntry={type:'redeem',pts:0,date:nowStr(),note:`兌換券 ${couponId} 已核銷`};
  await saveMember({...targetMember,coupons:updatedCoupons,log:[logEntry,...(targetMember.log||[])]});

  if(resultEl) resultEl.innerHTML=`<span style="color:var(--sage)">✅ 核銷成功！<br>會員：<strong>${targetMember.name}</strong><br>時間：${nowStr()}</span>`;
  showToast(`✅ ${targetMember.name} 的兌換券已核銷`);
}

function renderAdminMembers(){
  document.getElementById('a-members').innerHTML=`
    <div class="a-card">
      <div class="a-card-title">👥 會員列表</div>
      <table class="m-table">
        <thead><tr><th>姓名</th><th>Email</th><th>累計點數</th><th>可用券</th><th>已核銷</th><th>加入日期</th></tr></thead>
        <tbody>${MEMBERS.map(m=>{
          const unused=(m.coupons||[]).filter(c=>!c.used).length;
          const used=(m.coupons||[]).filter(c=>c.used).length;
          return`<tr>
            <td><strong>${m.name}</strong></td>
            <td style="color:var(--mist);font-size:12px">${m.email||''}</td>
            <td><span style="font-weight:700;color:var(--caramel)">${m.totalStamps||0}</span> 點</td>
            <td>${unused>0?`<span style="background:#FFF3E0;color:var(--caramel);padding:3px 8px;border-radius:8px;font-size:12px;font-weight:700">${unused} 張</span>`:'—'}</td>
            <td style="color:var(--mist)">${used} 次</td>
            <td style="color:var(--mist);font-size:12px">${m.joinDate||''}</td>
          </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderAdminLog(){
  const allLog=MEMBERS.flatMap(m=>(m.log||[]).map(l=>({...l,memberName:m.name,memberEmail:m.email})));
  allLog.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('a-log').innerHTML=`
    <div class="a-card">
      <div class="a-card-title">📋 所有集點與核銷紀錄</div>
      ${!allLog.length?'<div style="color:var(--mist);font-size:13px;padding:12px 0">尚無紀錄</div>':
      `<table class="log-table">
        <thead><tr><th>時間</th><th>會員</th><th>類型</th><th>點數</th><th>說明</th></tr></thead>
        <tbody>${allLog.map(l=>`
          <tr>
            <td style="color:var(--mist);font-size:12px;white-space:nowrap">${l.date}</td>
            <td><strong>${l.memberName}</strong><br><span style="font-size:11px;color:var(--mist)">${l.memberEmail||''}</span></td>
            <td><span class="${l.type==='earn'?'badge-earn':'badge-redeem'}">${l.type==='earn'?'集點':'核銷'}</span></td>
            <td style="font-weight:700;color:${l.type==='earn'?'var(--sage)':'var(--blush)'}">${l.type==='earn'?'+'+l.pts:'☕'}</td>
            <td style="font-size:12px;color:var(--mist)">${l.note||''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
}

if(window._fbReady){ initFirebase(); }
else { window.addEventListener('fb-ready', initFirebase); }
