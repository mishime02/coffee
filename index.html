<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熙岸珈琲所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=ZCOOL+XiaoWei&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, getDoc }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfgScript = await fetch('./firebase-config.js').then(r=>r.text());
const cfgMatch  = cfgScript.match(/FIREBASE_CONFIG\s*=\s*(\{[\s\S]*?\})/);
let FIREBASE_CONFIG = {};
try { FIREBASE_CONFIG = eval('('+cfgMatch[1]+')'); } catch(e) {}

const app  = initializeApp(FIREBASE_CONFIG);
const db   = getFirestore(app);
const auth = getAuth(app);

window._db=db; window._auth=auth;
window._col=collection; window._doc=doc;
window._getDocs=getDocs; window._setDoc=setDoc; window._getDoc=getDoc;
window._GP=GoogleAuthProvider; window._signIn=signInWithPopup;
window._signOut=signOut; window._onAuth=onAuthStateChanged;
window._fbReady=true; window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root{
  --dark:    #3A3028;
  --dark2:   #5A4E44;
  --caramel: #C8854A;
  --cream:   #F5ECD7;
  --foam:    #FDF8F0;
  --sage:    #7A9E7E;
  --blush:   #E8756A;
  --mist:    #8B8FA8;
  --logo-red:#C0614A;
  --logo-teal:#3D6B72;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--foam);color:var(--dark);min-height:100vh;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:var(--cream);gap:16px;}
.brand-logo-txt{font-family:'Noto Sans TC',sans-serif;font-size:22px;font-weight:700;color:var(--cream);letter-spacing:.15em;}
.spinner{width:36px;height:36px;border:3px solid rgba(200,133,74,.3);border-top-color:var(--caramel);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--dark);}
#login-screen.show{display:flex;}
.login-box{background:#fff;border-radius:28px;padding:48px 40px;max-width:360px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.login-logo-img{width:72px;height:72px;object-fit:contain;margin:0 auto 12px;display:block;}
.login-store-name{font-size:20px;font-weight:600;letter-spacing:.15em;color:var(--dark);margin-bottom:4px;font-family:"Noto Serif TC",serif;}
.login-tagline{font-size:12px;color:var(--mist);margin-bottom:32px;letter-spacing:.05em;}
.login-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--mist);margin-bottom:28px;line-height:1.7;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1.5px solid #e0e0e0;border-radius:14px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#3c3c3c;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.google-btn:hover{border-color:#4285F4;box-shadow:0 4px 16px rgba(66,133,244,.2);transform:translateY(-1px);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
.login-note{font-size:11px;color:var(--mist);margin-top:20px;line-height:1.7;}

/* App */
#app{display:none;}#app.show{display:block;}

/* Topbar */
.topbar{background:var(--dark);color:var(--cream);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:48px;height:48px;object-fit:contain;filter:brightness(1.1);}
.topbar-brand{font-size:16px;font-weight:600;letter-spacing:.18em;color:var(--cream);font-family:"Noto Serif TC",serif;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.mode-tabs{display:flex;gap:4px;}
.mode-btn{padding:6px 18px;border:none;border-radius:20px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:600;}
.mode-btn.active{background:var(--caramel);color:#fff;}
.mode-btn:not(.active){background:transparent;color:var(--cream);opacity:.65;}
.mode-btn:not(.active):hover{opacity:1;background:rgba(255,255,255,.12);}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--caramel);}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--cream);border-radius:12px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;opacity:.7;}
.logout-btn:hover{opacity:1;}

/* Nav */
.nav-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.pill.active{background:var(--caramel);color:#fff;}
.view{display:none;}.view.show{display:block;}

/* Client wrap */
.client-wrap{max-width:440px;margin:0 auto;padding:20px 16px 60px;}
.user-info-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.user-info-bar img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.user-info-name{font-weight:700;font-size:14px;}
.user-info-email{font-size:11px;color:var(--mist);}
.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;}

/* ── 集點卡 ── */

  background:linear-gradient(145deg, #6B5C52 0%, #8C7B70 100%);
  border-radius:24px;padding:28px 24px;color:#fff;
  margin-bottom:20px;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}

.stamp-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.stamp-card-brand{font-size:16px;font-weight:700;letter-spacing:.1em;color:var(--cream);}
.stamp-card-label{font-size:10px;opacity:.45;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.stamp-card-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:6px 14px;text-align:center;min-width:64px;}
.stamp-card-badge-num{font-size:24px;font-weight:700;line-height:1;}
.stamp-card-badge-sub{font-size:10px;opacity:.55;margin-top:2px;}
.stamp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px;}
.stamp{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s;border:1.5px solid rgba(255,255,255,.15);overflow:hidden;}
.stamp.filled{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.5);}
.stamp.filled img{width:88%;height:88%;object-fit:contain;filter:brightness(1.1) drop-shadow(0 1px 4px rgba(0,0,0,.2));}
.stamp.empty{background:rgba(255,255,255,.05);}
.stamp-card-footer{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;}
.stamp-card-name{font-size:15px;font-weight:700;opacity:.9;min-width:0;}
.stamp-card-sub{font-size:11px;opacity:.45;margin-top:2px;white-space:nowrap;}
.stamp-progress{font-size:10px;opacity:.55;white-space:nowrap;flex-shrink:0;text-align:right;}

/* ── 兌換券 ── */
.coupon-section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.coupon-count-badge{background:var(--caramel);color:#fff;border-radius:12px;padding:2px 10px;font-size:13px;font-weight:700;}
.coupon-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.coupon-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);cursor:pointer;transition:transform .2s;}
.coupon-card:hover{transform:translateY(-2px);}
.coupon-card-inner{display:flex;align-items:stretch;}
.coupon-left{background:#F5ECD7;width:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.coupon-left::after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:16px;height:16px;background:var(--foam);border-radius:50%;}
.coupon-right{padding:14px 16px;flex:1;}
.coupon-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.coupon-sub{font-size:12px;color:var(--mist);}
.coupon-arrow{font-size:18px;color:var(--mist);display:flex;align-items:center;padding-right:14px;}
.coupon-empty{text-align:center;padding:28px 20px;color:var(--mist);background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.coupon-empty-icon{font-size:36px;margin-bottom:8px;}
.coupon-empty-txt{font-size:13px;line-height:1.7;}

/* ── 兌換券 Panel ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.panel{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.panel-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 24px;}
.panel-title{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center;}
.panel-sub{font-size:13px;color:var(--mist);text-align:center;margin-bottom:24px;}
.coupon-qr-wrap{display:flex;justify-content:center;margin-bottom:20px;}
.coupon-qr-box{background:var(--foam);border-radius:20px;padding:20px;border:2.5px solid var(--caramel);text-align:center;}
.coupon-code-txt{font-family:monospace;font-size:12px;color:var(--mist);margin-top:10px;letter-spacing:.05em;}
.panel-note{background:#FFF8F0;border-radius:12px;padding:12px 16px;font-size:13px;color:var(--dark2);line-height:1.6;margin-bottom:20px;text-align:center;}
.panel-btn{width:100%;padding:15px;background:var(--dark);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.panel-btn:hover{opacity:.85;}
.panel-btn.close-btn{background:#f0ebe4;color:var(--dark);margin-top:10px;}

/* 集點紀錄 */
.log-row{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;}
.log-type-earn{color:var(--sage);font-weight:600;font-size:13px;}
.log-type-redeem{color:var(--blush);font-weight:600;font-size:13px;}
.log-date{font-size:12px;color:var(--mist);margin-top:3px;}
.log-pts{font-size:22px;font-weight:700;color:var(--caramel);}
.log-pts-label{font-size:11px;color:var(--mist);text-align:right;}

/* 掃碼結果頁 */
#scan-view{display:none;}
.scan-wrap{max-width:380px;margin:40px auto;padding:0 20px;text-align:center;}
.scan-card{background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.scan-icon{font-size:56px;margin-bottom:16px;}
.scan-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.scan-sub{font-size:14px;color:var(--mist);line-height:1.7;margin-bottom:24px;white-space:pre-line;}
.scan-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;background:var(--dark);color:#fff;}

/* Admin */
.admin-wrap{max-width:820px;margin:0 auto;padding:24px 16px;}
.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.admin-head-title{font-size:22px;font-weight:700;}
.admin-head-date{font-size:13px;color:var(--mist);}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.kpi-label{font-size:12px;color:var(--mist);margin-bottom:8px;font-weight:500;}
.kpi-val{font-size:28px;font-weight:700;color:var(--dark);}
.kpi-sub{font-size:12px;color:var(--sage);margin-top:4px;font-weight:500;}
.a-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;}
.a-card-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.qr-panel{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
.qr-box{flex-shrink:0;background:#fff;border:2.5px solid var(--caramel);border-radius:20px;padding:20px;text-align:center;}
.qr-info{flex:1;min-width:200px;}
.qr-code-display{font-family:monospace;font-size:12px;background:#f5f0e8;border-radius:8px;padding:8px 12px;margin-bottom:12px;word-break:break-all;color:var(--dark2);}
.pts-slider-label{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;}
.pts-val{color:var(--caramel);font-size:18px;}
input[type=range]{width:100%;accent-color:var(--caramel);cursor:pointer;}
.regen-btn{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:12px;}
.regen-btn:hover{opacity:.85;}
.scanner-area{background:#000;border-radius:16px;overflow:hidden;max-width:320px;margin:0 auto 16px;}
#qr-reader{width:100%;}
.scan-result-box{background:#f5f0e8;border-radius:12px;padding:16px;margin-bottom:14px;font-size:14px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;color:var(--dark2);line-height:1.6;}

/* 管理端確認核銷 overlay */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;border-radius:24px;padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.25);}
.confirm-icon{font-size:48px;margin-bottom:16px;}
.confirm-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.confirm-member{font-size:15px;color:var(--dark2);margin-bottom:6px;}
.confirm-time{font-size:12px;color:var(--mist);margin-bottom:24px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btn-yes{flex:1;padding:14px;background:var(--sage);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.confirm-btn-no{flex:1;padding:14px;background:#f0ebe4;color:var(--dark);border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}

.m-table{width:100%;border-collapse:collapse;}
.m-table th{font-size:12px;color:var(--mist);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid #f0ebe4;}
.m-table td{font-size:13px;padding:10px 12px;border-bottom:1px solid #f7f4f0;}
.m-table tr:last-child td{border-bottom:none;}
.log-table{width:100%;border-collapse:collapse;}
.log-table th{font-size:12px;color:var(--mist);font-weight:500;padding:8px 12px;border-bottom:1px solid #f0ebe4;text-align:left;}
.log-table td{font-size:13px;padding:10px 12px;border-bottom:1px solid #f7f4f0;}
.log-table tr:last-child td{border-bottom:none;}
.badge-earn{background:#E8F5E9;color:var(--sage);padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;}
.badge-redeem{background:#FEE2E0;color:var(--blush);padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;}
.denied-wrap{max-width:380px;margin:80px auto;padding:0 20px;text-align:center;}
.denied-card{background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .qr-panel{flex-direction:column;align-items:center;}
  .qr-info{width:100%;}
  .topbar-brand{font-size:14px;}
}

/* ══ 點餐 & 商店 共用 ══ */
.menu-section{max-width:480px;margin:0 auto;padding:16px 16px 80px;}
.menu-cat-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;}
.menu-cat-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .2s;flex-shrink:0;}
.menu-cat-btn.active{background:var(--caramel);color:#fff;}
.menu-item-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.menu-item-card{background:#fff;border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;}
.menu-item-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1);}
.menu-item-card.unavail{opacity:.45;cursor:not-allowed;}
.menu-item-left{flex:1;}
.menu-item-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.menu-item-desc{font-size:12px;color:var(--mist);margin-bottom:6px;}
.menu-item-price{font-size:15px;font-weight:700;color:var(--caramel);}
.menu-item-right{display:flex;align-items:center;gap:6px;margin-left:12px;}
.item-qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--caramel);background:#fff;color:var(--caramel);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.item-qty-num{font-weight:700;min-width:20px;text-align:center;font-size:15px;}
.item-img{width:64px;height:64px;border-radius:10px;object-fit:cover;margin-right:12px;flex-shrink:0;}

/* 購物車浮動按鈕 */
.order-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;border:none;border-radius:30px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:'Noto Sans TC',sans-serif;z-index:50;min-width:220px;justify-content:center;transition:transform .2s;}
.order-float:hover{transform:translateX(-50%) translateY(-2px);}
.order-float-badge{background:var(--caramel);border-radius:12px;padding:2px 10px;font-size:13px;}

/* 訂單面板 */
.order-panel-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.order-panel-name{font-weight:600;font-size:14px;}
.order-panel-price{color:var(--caramel);font-weight:700;font-size:14px;}
.order-note-input{width:100%;padding:10px 14px;border:1.5px solid #e8e0d5;border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;resize:none;margin-bottom:12px;}
.order-note-input:focus{border-color:var(--caramel);}
.order-submit-btn{width:100%;padding:15px;background:var(--dark);color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.order-submit-btn:hover{opacity:.85;}

/* 訂單成功 */
.order-success{text-align:center;padding:20px 0;}
.order-success-num{font-size:64px;font-weight:900;color:var(--caramel);line-height:1;margin:12px 0;}
.order-success-label{font-size:13px;color:var(--mist);margin-bottom:4px;}
.order-success-hint{font-size:13px;color:var(--mist);line-height:1.7;margin-top:12px;}

/* ══ 管理端：點餐管理 ══ */
.order-tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.ticket{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);border-left:4px solid var(--caramel);}
.ticket.done{border-left-color:#ccc;opacity:.6;}
.ticket-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ticket-num{font-size:22px;font-weight:900;color:var(--caramel);}
.ticket-time{font-size:11px;color:var(--mist);}
.ticket-type{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:#FFF3E0;color:var(--caramel);}
.ticket-type.shop{background:#E8F5E9;color:var(--sage);}
.ticket-items{font-size:13px;color:#444;line-height:1.8;margin-bottom:12px;}
.ticket-note{font-size:12px;color:var(--mist);font-style:italic;margin-bottom:10px;}
.ticket-done-btn{width:100%;padding:10px;background:var(--sage);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.ticket-done-btn:hover{opacity:.85;}
.ticket-print-btn{width:100%;padding:10px;background:var(--dark);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:8px;}
.no-orders{text-align:center;padding:48px 0;color:var(--mist);font-size:14px;}

/* ══ 管理端：菜單管理 ══ */
.mgmt-form{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;}
.mgmt-input{width:100%;padding:10px 14px;border:1.5px solid #e8e0d5;border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:10px;color:var(--dark);}
.mgmt-input:focus{border-color:var(--caramel);}
.mgmt-row{display:flex;gap:10px;}
.mgmt-row .mgmt-input{margin-bottom:0;}
.mgmt-add-btn{padding:10px 20px;background:var(--dark);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.mgmt-item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#faf8f5;border-radius:10px;margin-bottom:8px;}
.mgmt-item-name{font-weight:600;font-size:14px;}
.mgmt-item-price{color:var(--caramel);font-weight:700;font-size:13px;}
.mgmt-item-cat{font-size:11px;color:var(--mist);margin-top:2px;}
.mgmt-del-btn{padding:5px 12px;background:#FEE2E0;color:var(--blush);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.avail-toggle{padding:5px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-right:6px;}
.avail-toggle.on{background:#E8F5E9;color:var(--sage);}
.avail-toggle.off{background:#FEE2E0;color:var(--blush);}

/* ══ 管理端：現場代點 ══ */
.pos-wrap{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;}
.pos-menu{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.pos-cart{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:76px;}
.pos-cart-title{font-size:15px;font-weight:700;margin-bottom:12px;}
.pos-cart-empty{text-align:center;padding:20px 0;color:var(--mist);font-size:13px;}
.pos-cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f0e8;}
.pos-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding:12px 0 8px;}
.pos-submit{width:100%;padding:13px;background:var(--dark);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:4px;}
.pos-clear{width:100%;padding:10px;background:#f0ebe4;color:var(--dark);border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:6px;}
.pos-item-card{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#faf8f5;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.pos-item-card:hover{background:#f0ebe4;}
.new-order-banner{background:var(--sage);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;text-align:center;margin-bottom:14px;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}

@media(max-width:700px){
  .pos-wrap{grid-template-columns:1fr;}
  .pos-cart{position:static;}
}

</style>

function nowStr(){ return new Date().toLocaleString('zh-TW',{hour12:false}); }

let toastT;
function showToast(msg){
  let t=document.querySelector('.toast');if(t)t.remove();clearTimeout(toastT);
  t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2800);
}

// ── Firebase ───────────────────────────────────────
async function initFirebase(){
  db=window._db; auth=window._auth;
  window._onAuth(auth, async user=>{
    if(user){
      currentUser=user;
      await ensureMember(user);
      await loadMembers();
      const params=new URLSearchParams(location.search);
      const code=params.get('code');
      const redeem=params.get('redeem');
      if(code) await handleStampScan(code);
      else if(redeem) await handleClientRedeemNotify(redeem);
      else showApp(user);
    } else {
      currentUser=null;
      showLoginScreen();
    }
  });
}

async function ensureMember(user){
  const ref=window._doc(db,'members',user.uid);
  const snap=await window._getDoc(ref);
  if(!snap.exists()){
    await window._setDoc(ref,{
      id:user.uid,name:user.displayName||'會員',
      email:user.email,photo:user.photoURL||'',
      totalStamps:0,coupons:[],log:[],joinDate:today()
    });
  }
}
async function loadMembers(){
  const snap=await window._getDocs(window._col(db,'members'));
  MEMBERS=snap.docs.map(d=>d.data());
  memberData=MEMBERS.find(m=>m.id===currentUser?.uid)||null;
}
async function saveMember(m){
  await window._setDoc(window._doc(db,'members',m.id),m);
  MEMBERS=MEMBERS.map(x=>x.id===m.id?m:x);
  if(m.id===currentUser?.uid) memberData=m;
}
async function getQRConfig(){
  const snap=await window._getDoc(window._doc(db,'config','qr'));
  return snap.exists()?snap.data():null;
}
async function saveQRConfig(cfg){ await window._setDoc(window._doc(db,'config','qr'),cfg); }

// ── Auth UI ────────────────────────────────────────
function showLoginScreen(){
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').classList.add('show');
  document.getElementById('app').classList.remove('show');
  document.getElementById('scan-view').style.display='none';
}
function showApp(user){
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('scan-view').style.display='none';
  document.getElementById('app').classList.add('show');
  if(user.photoURL){
    document.getElementById('user-avatar').src=user.photoURL;
    document.getElementById('client-avatar').src=user.photoURL;
  }
  document.getElementById('client-name').textContent=user.displayName||'會員';
  document.getElementById('client-email').textContent=user.email;
  document.getElementById('mode-tabs').style.display=isAdmin()?'flex':'none';
  renderClientView('c-stamp');
}
async function doLogin(){ try{ await window._signIn(auth,new window._GP()); }catch(e){ showToast('登入失敗，請再試一次'); } }
async function doLogout(){ await window._signOut(auth); }
function goHome(){ location.href=location.pathname; }

// ── 掃碼集點 ──────────────────────────────────────
async function handleStampScan(code){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('scan-view').style.display='block';

  const icon=document.getElementById('scan-icon');
  const title=document.getElementById('scan-title');
  const sub=document.getElementById('scan-sub');
  const btn=document.getElementById('scan-btn');

  if(!currentUser){
    icon.textContent='🔑'; title.textContent='請先登入';
    sub.textContent='登入後才能領取點數';
    btn.textContent='Google 登入'; btn.style.display='block';
    btn.onclick=async()=>{ try{ await window._signIn(auth,new window._GP()); }catch(e){} };
    return;
  }
  try{
    const cfg=await getQRConfig();
    if(!cfg||cfg.code!==code){
      icon.textContent='❌'; title.textContent='QR Code 已失效';
      sub.textContent='此 QR Code 已過期。\n請向店員取得最新的 QR Code。';
      btn.textContent='回到集點卡'; btn.style.display='block'; btn.onclick=goHome;
      return;
    }
    const pts=cfg.points||1;
    const m=memberData||{id:currentUser.uid,name:currentUser.displayName,email:currentUser.email,photo:currentUser.photoURL||'',totalStamps:0,coupons:[],log:[],joinDate:today()};
    const prev=m.totalStamps||0;
    const newTotal=prev+pts;
    const prevCoupons=Math.floor(prev/STAMP_MAX);
    const newCoupons=Math.floor(newTotal/STAMP_MAX);
    const earnedCoupons=newCoupons-prevCoupons;
    const newCouponList=[...(m.coupons||[])];
    for(let i=0;i<earnedCoupons;i++) newCouponList.push({id:randCode(),earnedAt:nowStr(),used:false});
    const logEntry={type:'earn',pts,date:nowStr(),note:'掃碼集點'};
    const updated={...m,totalStamps:newTotal,coupons:newCouponList,log:[logEntry,...(m.log||[])]};
    await saveMember(updated);
    const displayStamps=newTotal%STAMP_MAX;
    if(earnedCoupons>0){
      icon.textContent='🎉'; title.textContent=`集滿 ${STAMP_MAX} 點！獲得兌換券！`;
      sub.textContent=`獲得 ${pts} 點\n🎁 新增 ${earnedCoupons} 張外帶中杯飲品兌換券\n目前共有 ${newCouponList.filter(c=>!c.used).length} 張可用券`;
    } else {
      icon.textContent='☕'; title.textContent=`成功獲得 ${pts} 點！`;
      sub.textContent=`累計已集 ${newTotal} 點\n目前進度：${displayStamps} / ${STAMP_MAX} 點\n再集 ${STAMP_MAX-displayStamps} 點可獲得兌換券`;
    }
    btn.textContent='查看我的集點卡'; btn.style.display='block'; btn.onclick=goHome;
  }catch(e){
    icon.textContent='⚠️'; title.textContent='發生錯誤';
    sub.textContent='請稍後再試或聯絡店家。';
    btn.textContent='回到集點卡'; btn.style.display='block'; btn.onclick=goHome;
  }
}

// ── 客戶端：收到核銷通知（redeem 參數）────────────
// 當管理端掃描並確認後，客戶端重新整理會看到成功畫面
// 這裡處理的是客戶自己打開帶 redeem 參數的 URL 的情況（不常見，保留邏輯）
async function handleClientRedeemNotify(couponId){
  // 直接顯示 app，然後顯示兌換成功
  showApp(currentUser);
  await loadMembers();
  const m=memberData;
  const coupon=(m?.coupons||[]).find(c=>c.id===couponId);
  if(coupon?.used){
    document.getElementById('success-overlay').classList.add('open');
  }
}

// ── Mode / Nav ─────────────────────────────────────
function switchMode(mode){
  ['mode-client','mode-admin','mode-denied'].forEach(id=>document.getElementById(id).style.display='none');
  if(mode==='admin'&&!isAdmin()){ document.getElementById('mode-denied').style.display='block'; }
  else if(mode==='admin'){
    document.getElementById('mode-admin').style.display='block';
    document.getElementById('admin-date').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
    loadMembers().then(()=>renderAdminView('a-orders'));
  } else {
    document.getElementById('mode-client').style.display='block';
    renderClientView(document.querySelector('#mode-client .view.show')?.id||'c-stamp');
  }
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='client')||(i===1&&mode==='admin')));
}
function clientNav(id,btn){
  document.querySelectorAll('#mode-client .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  if(id==='c-order') renderOrderMenu();
  else if(id==='c-shop') renderShopMenu();
  else renderClientView(id);
}
function adminNav(id,btn){
  if(html5QrScanner){ try{ html5QrScanner.stop().catch(()=>{}); }catch(e){} html5QrScanner=null; scannerRunning=false; }
  if(orderAutoRefresh&&id!=='a-orders'){ clearInterval(orderAutoRefresh); orderAutoRefresh=null; }
  document.querySelectorAll('#mode-admin .view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  btn.closest('.nav-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); renderAdminView(id);
}

// ── Client views ───────────────────────────────────
function renderClientView(id){
  if(id==='c-stamp') renderStampCard();
  if(id==='c-history') renderHistory();
}

function renderStampCard(){
  const m=memberData||{totalStamps:0,coupons:[],log:[]};

function renderHistory(){
  const m=memberData||{log:[]};
  const log=m.log||[];
  document.getElementById('c-history').innerHTML=`
    <div class="sec-title">📋 集點紀錄</div>
    ${!log.length?`<div style="color:var(--mist);font-size:13px;padding:20px 0;text-align:center">尚無紀錄<br>快去掃描 QR Code 集點吧！</div>`:
    log.map(l=>`
      <div class="log-row">
        <div>
          <div class="${l.type==='earn'?'log-type-earn':'log-type-redeem'}">${l.type==='earn'?'獲得點數':'使用兌換券'}</div>
          <div class="log-date">${l.date}</div>
          ${l.note?`<div style="font-size:12px;color:var(--mist);margin-top:2px">${l.note}</div>`:''}
        </div>
        <div style="text-align:right">
          ${l.type==='earn'?`<div class="log-pts">+${l.pts}</div><div class="log-pts-label">點</div>`:'<div style="font-size:22px">☕</div>'}
        </div>
      </div>`).join('')}`;
}

// ── 兌換券 Panel ───────────────────────────────────
function openCoupon(couponId){
  const m=memberData||{};
  const coupon=(m.coupons||[]).find(c=>c.id===couponId);
  if(!coupon) return;
  const redeemUrl=`${location.origin}${location.pathname}?redeem=${couponId}`;
  document.getElementById('coupon-qr-canvas').innerHTML='';
  document.getElementById('coupon-qr-code-txt').textContent=couponId;
  document.getElementById('coupon-overlay').classList.add('open');
  setTimeout(()=>{
    const el=document.getElementById('coupon-qr-canvas');
    if(el){ el.innerHTML=''; new QRCode(el,{text:redeemUrl,width:180,height:180,colorDark:'#3A3028',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H}); }
  },100);
}
function closePanel(){ document.getElementById('coupon-overlay').classList.remove('open'); }

function closeSuccessAndRefresh(){
  document.getElementById('success-overlay').classList.remove('open');
  loadMembers().then(()=>renderClientView('c-stamp'));
}

// ── Admin views ────────────────────────────────────
function renderAdminView(id){
  if(id==='a-orders')    renderAdminOrders();
  if(id==='a-pos')       renderAdminPOS();
  if(id==='a-menu-mgmt') renderAdminMenuMgmt();
  if(id==='a-shop-mgmt') renderAdminShopMgmt();
  if(id==='a-qr')        renderAdminQR();
  if(id==='a-scan')      renderAdminScanner();
  if(id==='a-members')   renderAdminMembers();
  if(id==='a-log')       renderAdminLog();
}

async function renderAdminQR(){
  const cfg=await getQRConfig();
  const code=cfg?.code||'';
  const pts=cfg?.points||1;
  adminPtsValue=pts;
  const url=code?`${location.origin}${location.pathname}?code=${code}`:'';
  document.getElementById('a-qr').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">總會員數</div><div class="kpi-val">${MEMBERS.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">累計集點次數</div><div class="kpi-val">${MEMBERS.reduce((s,m)=>s+(m.log||[]).filter(l=>l.type==='earn').length,0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">累計核銷次數</div><div class="kpi-val">${MEMBERS.reduce((s,m)=>s+(m.coupons||[]).filter(c=>c.used).length,0)}</div></div>
    </div>
    <div class="a-card">
      <div class="a-card-title">🔳 店家集點 QR Code</div>
      <div class="qr-panel">
        <div class="qr-box">
          <div id="admin-qr-canvas" style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;">
            ${!code?'<div style="color:var(--mist);font-size:13px;text-align:center">尚未生成<br>QR Code</div>':''}
          </div>
          ${code?'<div style="font-size:11px;color:var(--mist);margin-top:10px;text-align:center">客人掃此碼集點</div>':''}
        </div>
        <div class="qr-info">
          ${code?`<div style="font-size:13px;font-weight:700;margin-bottom:6px">目前 Code</div><div class="qr-code-display">${code}</div>`:'<div style="color:var(--mist);font-size:13px;margin-bottom:12px">請先生成 QR Code</div>'}
          <div style="margin-bottom:14px">
            <div class="pts-slider-label">
              <span>掃碼獲得點數</span>
              <span class="pts-val" id="pts-display">${pts} 點</span>
            </div>
            <input type="range" min="1" max="12" value="${pts}" id="pts-slider"
              oninput="adminPtsValue=+this.value;document.getElementById('pts-display').textContent=this.value+' 點'">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mist);margin-top:4px"><span>1</span><span>12</span></div>
          </div>
          <button class="regen-btn" onclick="regenQR()">🔄 ${code?'重新生成 QR Code':'生成 QR Code'}</button>
          ${code?'<div style="font-size:11px;color:var(--mist);margin-top:10px;text-align:center">重新生成後舊的立即失效</div>':''}
        </div>
      </div>
    </div>`;
  if(code){
    setTimeout(()=>{
      const el=document.getElementById('admin-qr-canvas');
      if(el){ el.innerHTML=''; new QRCode(el,{text:url,width:180,height:180,colorDark:'#3A3028',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H}); }
    },100);
  }
}

async function regenQR(){
  const newCode=Math.random().toString(36).slice(2,10).toUpperCase();
  const pts=adminPtsValue||parseInt(document.getElementById('pts-slider')?.value)||1;
  await saveQRConfig({code:newCode,points:pts,updatedAt:nowStr()});
  showToast(`✅ 新 QR Code 已生成，${pts} 點/次`);
  renderAdminQR();
}

function renderAdminScanner(){

    <div class="a-card">

      <div class="scanner-area"><div id="qr-reader"></div></div>
      <div class="scan-result-box" id="admin-scan-result">請點「開始掃描」，將客人的兌換券 QR Code 對準鏡頭</div>

function toggleScanner(){
  if(scannerRunning){ stopScanner(); } else { startScanner(); }
}
function startScanner(){
  if(html5QrScanner) return;
  html5QrScanner=new Html5Qrcode('qr-reader');
  html5QrScanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:220,height:220}},
    async(decodedText)=>{ await processRedeemCode(decodedText); },
    ()=>{}
  ).then(()=>{
    scannerRunning=true;
    const btn=document.getElementById('scanner-toggle');
    if(btn) btn.textContent='⏹ 停止掃描';
  }).catch(()=>{ showToast('無法開啟相機，請確認已授予相機權限'); });
}
function stopScanner(){
  if(html5QrScanner){
    html5QrScanner.stop().then(()=>{ html5QrScanner.clear(); html5QrScanner=null; scannerRunning=false; }).catch(()=>{});
    const btn=document.getElementById('scanner-toggle');
    if(btn) btn.textContent='▶ 開始掃描';
  }
}

async function processRedeemCode(text){
  let couponId=text;
  try{ const url=new URL(text); couponId=url.searchParams.get('redeem')||text; }catch(e){}

  stopScanner();
  const resultEl=document.getElementById('admin-scan-result');
  if(resultEl) resultEl.textContent='查詢中…';

  await loadMembers();
  let targetMember=null, targetCoupon=null;
  for(const m of MEMBERS){
    const c=(m.coupons||[]).find(c=>c.id===couponId);
    if(c){ targetMember=m; targetCoupon=c; break; }
  }

  if(!targetMember||!targetCoupon){
    if(resultEl) resultEl.innerHTML='<span style="color:var(--blush)">❌ 找不到此兌換券</span>';
    return;
  }
  if(targetCoupon.used){
    if(resultEl) resultEl.innerHTML=`<span style="color:var(--blush)">⚠️ 此券已使用<br>會員：${targetMember.name}<br>核銷時間：${targetCoupon.usedAt||''}</span>`;
    return;
  }

  // 暫存待確認資料，顯示確認 overlay
  pendingRedeemData={ member: targetMember, couponId };
  document.getElementById('confirm-member-name').textContent=`會員：${targetMember.name}`;
  document.getElementById('confirm-scan-time').textContent=`掃描時間：${nowStr()}`;
  document.getElementById('confirm-overlay').classList.add('open');
  if(resultEl) resultEl.innerHTML='<span style="color:var(--caramel)">⏳ 等待確認核銷…</span>';
}

function cancelConfirm(){
  document.getElementById('confirm-overlay').classList.remove('open');
  pendingRedeemData=null;
  const resultEl=document.getElementById('admin-scan-result');
  if(resultEl) resultEl.textContent='已取消。請重新掃描。';
  // 重新啟動掃描器
  startScanner();
}

async function doConfirmRedeem(){
  if(!pendingRedeemData) return;
  const { member, couponId } = pendingRedeemData;
  document.getElementById('confirm-overlay').classList.remove('open');

  const updatedCoupons=(member.coupons||[]).map(c=>c.id===couponId?{...c,used:true,usedAt:nowStr()}:c);
  const logEntry={type:'redeem',pts:0,date:nowStr(),note:`兌換券 ${couponId} 已核銷`};
  await saveMember({...member,coupons:updatedCoupons,log:[logEntry,...(member.log||[])]});

  pendingRedeemData=null;
  const resultEl=document.getElementById('admin-scan-result');
  if(resultEl) resultEl.innerHTML=`<span style="color:var(--sage)">✅ 核銷成功！<br>會員：<strong>${member.name}</strong><br>時間：${nowStr()}</span>`;
  showToast(`✅ ${member.name} 的兌換券已核銷`);
}

async function loadMenuItems(){
  const snap=await window._getDocs(window._col(db,'menu'));
  MENU_ITEMS=snap.docs.map(d=>d.data()).filter(d=>d.type==='drink');
}
async function loadShopItems(){
  const snap=await window._getDocs(window._col(db,'menu'));
  SHOP_ITEMS=snap.docs.map(d=>d.data()).filter(d=>d.type==='shop');
}
async function saveMenuItem(item){ await window._setDoc(window._doc(db,'menu',item.id),item); }
async function delMenuItem(id){ await window._setDoc(window._doc(db,'menu',id),{id,deleted:true}); }

async function submitOrderToDB(orderData){
  const id='ORD-'+Date.now();
  await window._setDoc(window._doc(db,'orders',id),{...orderData,id,createdAt:nowStr(),status:'pending'});
  return id;
}
async function loadOrders(){
  const snap=await window._getDocs(window._col(db,'orders'));
  return snap.docs.map(d=>d.data()).filter(d=>!d.deleted).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
}
async function updateOrderStatus(id,status){
  await window._setDoc(window._doc(db,'orders',id),{status},{ merge:true });
}

// ── 流水號 ────────────────────────────────────────────
async function getNextOrderNum(){
  const ref=window._doc(db,'config','orderNum');
  const snap=await window._getDoc(ref);
  const current=snap.exists()?snap.data().num||0:0;
  const next=(current%999)+1;
  await window._setDoc(ref,{num:next});
  return String(next).padStart(3,'0');
}

// ── 購物車面板 ────────────────────────────────────────
function openOrderCart(mode){
  orderMode=mode;
  const cart=mode==='order'?orderCart:shopCart;
  const items=mode==='order'?MENU_ITEMS:SHOP_ITEMS;
  const label=mode==='order'?'確認點餐':'確認購物車';

  document.getElementById('order-cart-title').textContent=label;
  document.getElementById('order-note').value='';

  let html='', total=0;
  Object.entries(cart).forEach(([id,qty])=>{
    const item=items.find(x=>x.id===id); if(!item)return;
    total+=item.price*qty;
    html+=\`<div class="order-panel-item">
      <div><div class="order-panel-name">\${item.name}</div><div style="font-size:12px;color:var(--mist)">x\${qty}</div></div>
      <div class="order-panel-price">NT\$\${item.price*qty}</div>
    </div>\`;
  });
  document.getElementById('order-cart-items').innerHTML=html;
  document.getElementById('order-cart-total').textContent='NT\$'+total;
  document.getElementById('order-cart-total-row').style.display='flex';
  document.getElementById('order-cart-overlay').classList.add('open');
}
function closeOrderCart(){ document.getElementById('order-cart-overlay').classList.remove('open'); }

async function submitOrder(){
  const cart=orderMode==='order'?orderCart:shopCart;
  const items=orderMode==='order'?MENU_ITEMS:SHOP_ITEMS;
  const note=document.getElementById('order-note').value;
  const btn=document.getElementById('order-submit-btn');
  btn.disabled=true; btn.textContent='送出中…';

  const orderItems=Object.entries(cart).map(([id,qty])=>{
    const item=items.find(x=>x.id===id); return {id,name:item.name,price:item.price,qty};
  });
  const total=orderItems.reduce((s,x)=>s+x.price*x.qty,0);
  const num=await getNextOrderNum();

  await submitOrderToDB({
    num, type:orderMode, items:orderItems, total, note,
    memberName:currentUser?.displayName||'',
    memberId:currentUser?.uid||''
  });

  // 清空購物車
  if(orderMode==='order') { orderCart={}; }
  else { shopCart={}; }

  // 顯示成功畫面
  const typeLabel=orderMode==='order'?'點餐':'商店';
  document.getElementById('order-cart-items').innerHTML=\`
    <div class="order-success">
      <div style="font-size:48px">✅</div>
      <div class="order-success-label">訂單編號</div>
      <div class="order-success-num">#\${num}</div>
      <div class="order-success-hint">\${orderMode==='order'?'我們會盡快送餐到桌邊':'商品即將送到桌邊'}<br>離開時請至櫃台結帳</div>
    </div>\`;
  document.getElementById('order-cart-total-row').style.display='none';
  document.getElementById('order-note').style.display='none';
  btn.style.display='none';
  document.querySelector('#order-cart-overlay .close-btn').textContent='關閉';

  setTimeout(()=>{
    closeOrderCart();
    document.getElementById('order-note').style.display='block';
    btn.style.display='block'; btn.disabled=false; btn.textContent='送出訂單';
    if(orderMode==='order') renderOrderMenu(); else renderShopMenu();
  },3000);
}

}
function posAddItem(id){ posCart[id]=(posCart[id]||0)+1; renderAdminPOS(); }
function posRemoveItem(id){ posCart[id]=(posCart[id]||0)-1; if(posCart[id]<=0)delete posCart[id]; renderAdminPOS(); }
function posClear(){ posCart={}; renderAdminPOS(); }
async function posSubmit(){
  const items=MENU_ITEMS.filter(m=>!m.deleted);
  const note=document.getElementById('pos-note')?.value||'';
  const orderItems=Object.entries(posCart).map(([id,qty])=>{
    const it=items.find(x=>x.id===id); return{id,name:it.name,price:it.price,qty};});
  const total=orderItems.reduce((s,x)=>s+x.price*x.qty,0);
  const num=await getNextOrderNum();
  await submitOrderToDB({num,type:'order',items:orderItems,total,note,memberName:'現場代點',memberId:''});
  showToast(\`✅ 訂單 #\${num} 已送出\`);
  posCart={};
  renderAdminPOS();
}

async function renderAdminMenuMgmt(){
  await loadMenuItems();
  const items=MENU_ITEMS.filter(m=>!m.deleted);
  document.getElementById('a-menu-mgmt').innerHTML=\`
    <div class="mgmt-form a-card">
      <div class="a-card-title">➕ 新增飲品</div>
      <input class="mgmt-input" id="mn-name" placeholder="飲品名稱">
      <input class="mgmt-input" id="mn-desc" placeholder="描述（可不填）">
      <div class="mgmt-row" style="margin-bottom:10px">
        <input class="mgmt-input" id="mn-price" placeholder="價格" type="number">
        <input class="mgmt-input" id="mn-cat" placeholder="分類（如：咖啡、茶飲）">
        <button class="mgmt-add-btn" onclick="addMenuItem()">新增</button>
      </div>
    </div>
    <div class="a-card">
      <div class="a-card-title">☕ 飲品列表</div>
      \${!items.length?'<div style="color:var(--mist);font-size:13px">尚無品項</div>':
        items.map(item=>\`
        <div class="mgmt-item-row">
          <div>
            <div class="mgmt-item-name">\${item.name}</div>
            <div class="mgmt-item-cat">\${item.category||'未分類'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="mgmt-item-price">NT\$\${item.price}</div>
            <button class="avail-toggle \${item.available!==false?'on':'off'}" onclick="toggleMenuAvail('\${item.id}',\${item.available!==false})">
              \${item.available!==false?'供應中':'已暫停'}
            </button>
            <button class="mgmt-del-btn" onclick="deleteMenuItem('\${item.id}')">刪除</button>
          </div>
        </div>\`).join('')}
    </div>\`;
}

async function addMenuItem(){
  const name=document.getElementById('mn-name').value.trim();
  const price=parseInt(document.getElementById('mn-price').value);
  const cat=document.getElementById('mn-cat').value.trim();
  const desc=document.getElementById('mn-desc').value.trim();
  if(!name||!price){showToast('請填寫名稱和價格');return;}
  const id='MN-'+Date.now();
  await saveMenuItem({id,name,price,category:cat,desc,type:'drink',available:true});
  showToast('✅ 已新增 '+name);
  document.getElementById('mn-name').value='';
  document.getElementById('mn-price').value='';
  document.getElementById('mn-cat').value='';
  document.getElementById('mn-desc').value='';
  renderAdminMenuMgmt();
}
async function toggleMenuAvail(id,current){
  const item=MENU_ITEMS.find(x=>x.id===id); if(!item)return;
  await saveMenuItem({...item,available:!current});
  renderAdminMenuMgmt();
}
async function deleteMenuItem(id){
  if(!confirm('確定刪除此品項？'))return;
  const item=MENU_ITEMS.find(x=>x.id===id); if(!item)return;
  await saveMenuItem({...item,deleted:true});
  showToast('已刪除');
  renderAdminMenuMgmt();
}
